body:
  text: 東田遺稿别集類五明提要臣等謹案東田遺稿二巻明張羽撰羽字鳳舉奉興人𢎞治丙辰進士官至河南左布政使是集詩文各一巻為其季子楨所編門人儲洵序之羽為御史抗疏劾劉瑾直聲震朝野文雖不多其方正之概凜然見于行間詩亦規摹盛唐不落纖巧之習葢𢎞治正徳之間去明初前輩猶為未逺流風餘韻往往而在而羽之澹静峭直又出天性雖其博大富健不及李東陽程敏政排奡鉅麗亦不及李夢陽諸人而不為舊調之膚廓亦不為新聲之塗飾肖心而出務達所見而止在明作者中可以自為一隊矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東田遺稿序君子消長之道值其時而文隨之時進而章明勃乎蒸雲以利以澤時巻而懷則儼乎崇山逸氣上濟望者仰而誦之非道之異也國朝𢎞正之間籍顯地以雅實自任而能振拔士類如西涯李公篁墩程公海内舉稱文宗于時列曹署如我文懿公白巖虎谷九峰二泉諸公彬彬郁郁皆文行豪特之選東田先生始釋褐至京師一日以文名遂揖公卿席賔敬若古歐蘇學士云者故暇則游從談燕以詠以奕夜寒刻燭不覺漏曙别則爭賦詩飲餞巻聨愛直慷慨閎議升車而行搢紳偉之先生長身玉晢廉潔清方神秀頴發博聞强志不取合於流俗真翩翩振鷺也始令淳安讀鐵翁去思碑仁愛好教化以寛平稱良晉内臺伸威提法風裁徵明不為利疚不以勢詘讀地震開礦取燈諸疏危苦激切嚴聽敢毅表坐正人照彼佞者吁不得盡其極也當衡忌補掖郡保定賸左襠齧城之狐視先生敬憚之三月無敢撓治讀孫司徒九峯書悲其志連章乞歸再薦起貳藩臬踰年歸亟薦正左轄不浹時歸讀其言曰朝廷以廉退用臣臣敢不以名節自愛夫自愛以節三仕而三已進退之道抑時也哉先生曠逺峭直得一善則盱衡擊節黄見眉端即非其意雖籠富貴分糜爵奚啻傷損晩休東田偕其弟北渚先生髙情旁薄周流情理之間無溢言曼辭以為侈大無病畦厲色以資讇訒勁特而不能屈已寡禱而罕於曲應咏歌先王之澤滋暢正始之宗讀其詩琅琅有遺音矣嗚乎髙山大川不田不舟水土所珍以先生砥行而未大行以濟命也夫先生季子楨收次遺編從弟刻之家授簡命洵夫𤣥之秘芭習之韓之文漢叙之先生可得而聞者洵愚瞢然媿其能辭先生諱羽字鳳舉位望行歴載南溪中丞誌中洵特論其世繫哭門之思云爾嘉靖癸卯夏四月望賜進士第奉政大夫福建提刑按察司僉事前兵部郎中門人儲洵拜書
