隨郎一處行次韻玉岡秋興四首江上青山秋更竒賞懷猶隔楚天涯丹楓欲障千林晚黃鵠歸飛萬里時往事燈前悲昨夢流年暗裏惜芳姿霜寒鳥雀依叢急怪底飢鳶苦見欺何處秋生詩律竒杜陵蕭索蜀江涯孤舟淚迸啼猿後三峽濤回落木時鷗鳥自飛間不去芙蓉雖晚故多姿楚鄉雲雨還朝暮宋玉風流亦漫欺瀘水煙銷秋日晶關河風色慘邊情年光暗惜江蘺晚秋鬢愁看客鏡明十道羽書聞夕警五更城角落寒聲季鷹自昔多幽思不為鱸魚嘆逺征露下澄塘浸水晶芙蓉花落太無情青山近擁孤城壯銀漢高臨萬戶明小院松篁增爽氣誰家絃管劇商聲秋原莫哭誅求急薇蕨生多尚足征出滇至平夷館適覩合溪張天益道長留一詩壁間見候次韻為報社裏逢君可惠連華宗分派各江天千山雲樹蠻煙隔五月音書驛使傳詩好總知心獨苦官間贏得事多便相期共振埋輪業猶有豺狼滿道邊至普安察院合溪道長復留一詩見候次韻歸路依微取次尋前山日日厭登臨寒經索嶺霜林靜瘴入盤江晝霧深古驛荒涼驚嵗晚野雲容易結秋陰驅車縱獵輸誰子蔓草斜坡羡獲禽中山道中真定府趙州古中山地也二月中山道風塵障早行病思千日酒懶拂衆人情客夜便投寺兵時喜到城使君方謝事憐爾縣官迎贈國醫趙良臣秋來鬢髮欲添絲笑見兒行病起時貧憶宋清多義事疾逢秦緩足良醫刀圭苦口收餘味蘭蕙回春得故姿獨有江湖憂轉癖别君無語重凄其里人陳生善歌舊嘗識之十五年後再聞其歌因贈餘音尚憶小梁州十五年前作漫遊重上朱樓歌一曲楚天涼月在西樓贈陳百一山人客豫家者數年今歸六十看君白髮新江湖人笑往來頻機心已息碁常負談舌猶存食未貧折栁重驚南浦暮種桃空憶武陵春津亭渺渺應回首故國并州意更真釣臺次韻建德舟中作六十羊裘道路難九重鳳詔幾回丹交遊便合君臣定廊廟何如江海寬桐水一絲名節在雲臺千尺畫圗寒十年塵土嚴陵夢明日扁舟過釣灘客中春風珂馬曲江城曾共梅花賦廣平兄弟甲科猶有恨縉紳文字浪知名並遊年少皆能貴今日朝廷幸自清萬里風塵江上客長安遙望眼偏明港口小泊口號酬莊二教舟中見贈符分山縣記當年泛盡溪流笑靡然叢爵自依新赤子蠧魚曾出舊青編每欣芹暴因思獻見履庭霜識戒堅貧乏只今消息在雀生猶藉闕知傳贈鄭山人脈理依稀寄掌紋眼中竒伏定難論秦關百二金城在建業東南紫界分形勝未銷人共棄豪華欲盡石終存他鄉我亦嫌官拙還擬攜君看舊村聞雁與陳百一作押韻菰老蘆黃障淺池晚晴初喜凍雲披忽驚鳴雁霜中度似覺秋風塞上移胡騎漫勞矜碎栁棲烏正自㨂寒枝年年惆悵金河客錯憶岐周賦鳳儀病中喜友人王繼武逺過不能出迓口號寄意不見王郎三十年病中看刺轉生憐吹簫橋上悲秋月沽酒樓前瞥野煙詩格總知猶健在鬚髯驚説已皤然君應問我龍鍾態約略如君六載前楊大用大尹見示晚年生子詩次韻答賀賀客閧堂少白丁共誇椿樹老逾靈同時器識推楊子晚節芝蘭有謝庭宰邑定知陰德在承家端擬䇿名馨他年會約乘軒過聽取摩空作賦聲大用見示述懷之作因次韻青山晚愛攜笻往華髮秋憐覽鏡知江上浮鷗馴自好塵中驅馬去何之間尋謝墅圍碁侣病隔梁園授簡期坎止流行看更定豈因時態學悲絲病中喜雨在保定作伏枕聞鳴雨開窗愜病心天公神叵測旱魃爾何侵優渥應千里斯須可萬金更祈三日止牟麥忌恆陰題扇景湖上生秋雨簷間滴翠陰竹西風景在别路一驚心江晚山色遙黃蘆雁初起漁歌何處歸聲落滄浪裏夜至銅巖驛逢臧進士張茂才木葉下秋山歸人傍晚寒見燈投驛逺過雨涉溪難詩客逢侯喜碁儔憶謝安勝遊難可繼莫負吏情間黃希武宅觀奕奕鬬未全非開枰對夕暉過河乘勝算爭道觸危機老馬頻憂蹶竒兵忽冒圍羊公在江上陸抗莫専威鄉居用八弟鵠舉詩韻聊述東風近浦送漁歌澌盡平溪漫緑波野望獨便吟處逺春寒猶較病來多間看稚子排新局醉傍村翁藉軟莎遲暮未成投老計巢鳩聊寄北山阿幽居底事動長歌老大心知感逝波花外枯桑爭日永鏡中華髮逗春多薄田繞舍差宜黍小徑緣村漫掩莎何處冥鴻飛正逺更看鸞鳳競巢阿寄陳别駕汝耀三山雁使隔年回傳道甘棠樹重培别駕風流餘簿領郡齋蕭散到蓬萊榕陰暗裏衙聲合荔子紅時吏俸來獨向樵川愁病在好音遲子笑顔開拿口驛午憩次壁間詩韻山行彌月未論旬又聽前灘數候人太守十年從白髮樵陽兩度見青春風波險欲摧心折政事書堪與淚陳愁絶杜陵渾太瘦謫仙詩好為傳真壽李通判母華筵阿母下瑶臺彩服仙郎試老萊鸞誥舊從天上降蟠桃新出海中來釀分祿米恩波注錦簇官衙壽域開記取年年延賀客小春時節任徘徊次韻黃小江中秋是嵗閏八月桂香蘭馥夜交清心賞還同寄鶴城影合三人憐月色望遙一水憶簫聲病看簮紱真為祟忙覺玄泓久敗盟三五秋光吟過老盍簮愁咏少年行烏石風吹晚笛清閏年羇思黯閩城星河際海涵秋影鸞鶴凌風矯夜聲重見月圓還照酒似防秋去更尋盟銀蟾玉兔無才賦起看黃楊繞砌行贈黃北山書工如畫畫如詩王掾當年固不癡昨日里中歌舞伴人前解唱北山詞聞簫鳳樓縹眇接雲霄環珮聲微夜寂寥弄玉由來有仙骨時人莫浪學吹簫小孫輩病起謝戴元道國醫五十歸田計未遲西風肺氣欲蘇時久耽月俸遺家纍稍喜秋成給藥資老戀山林真有癖病愁兒女豈無私江邊千室渾凋瘁何得從君遍問醫秋雨桑竹陰陰淺護村午天風雨未開門時從屋底窺峰頂擬過橋西看水痕嵗事一㕓憂菽麥秋租三限急雞豚當年曾説心勞日欲起陽公與細論風雨歸舟次韻客到尋常不整巾旋羞雞黍供清貧孤舟分袂秋同逈獨鶴隨笻晚自馴曾迓雪中回剡曲定從花外説秦人于今更憶玄真子細雨斜風入詠新風雨應愁墊角巾相看渾笑出途貧知津更試輕舟捷諳路寧論老驥馴眼底風波懷共濟望中仙侣詫傍人明朝挂席期重到潦盡川平霽色新送劉尚絅赴桐廬幕送君明發遡江干越舶吳檣遞渺漫山鳥語更傾白苧海潮聲漫切猗蘭桐廬附浙元名縣蓮幕親民足好官獨有幽懷憐逺道夢隨飛舄落嚴灘明妃絶漠琵琶漢苑心胡雛漫聽豈知音自緣花貌渾難畫不是丹青故索金贈國醫張從實來往三神漫醉醒玉桃瑶草妬長齡丹砂九轉新傳訣道德千言舊注經南渡世家原共脈東田交誼久忘形煙霞僻處稀人迹却為逢君眼重青贈殷道士少年曾喜誦南華解指鄰山説是家九轉自調丹竈火千年應見碧桃花青溪道士寰中鶴碧海仙人袖裏蛇不為觀鵝頻過館駐顔端欲乞靈砂送黃主簿詩仙帆西去水連雲彭蠡匡廬楚望分黃憲未妨稱世德趙堯終不愧斯文移家嵗晚留鴻迹佐邑功存計馬羣好在年豐身健日太平林壑荷吾君挽潘主簿詩塵世浮榮夢不憑槿花先夕嘆飄零安仁病去曾誰誄邠老詩存漫托名五月孤嫠歸旅櫬千家父老泣銘旌東山山下流泉咽應為憐君帶哭聲送朱縣丞新來初握長官符漫訝歸裝問去途多病獨便拋簿領逺來應自劇江湖一官遲暮馮唐傳孤棹夷猶范蠡圖吾老東田慵卧在北門供帳有人無題劉大參函關圖卯金公子托金蘭惜别秦川雪滿山何處思君天萬里祗應清夢到函關題美人圖幽窗誰爇返魂香恍惚仙姿出洞房畫裏呼名渾欲語琴中傳意故成狂愁顰西子憐傾國心謝東鄰絶踰墻却恨丹青枉圖畫燕脂山外泣王嬙咏牡丹用唐人韻沉香亭路到無因悵望東風欲度春穠艷重逢木芍藥麗詞應泣謫仙人糚臺醉浥葡萄露錦襪香留瑞腦塵不用憑欄傷往事玉環元只是前身浪蕊浮花謝俗塵洛陽移種獨饒春雨中淡泊同幽客天與繁華鬬麗人開向驪宫驚羯鼓落從金谷印香塵東君珍重非韓令十二雕闌許托身題徐都司宅上海棠雨膩煙霏曉夢酣東風扶醉倚危欄遊人遙隔雕牆外桃李成林欲認難西園春曉二月東風曉逗寒西園剛借摽梅看幽人興落春華外不奈新紅上竹闌秋晚過堯卿弟莊白髮看吾弟兒童共昔年謝家偏玉樹何氏勝林泉病起能招客秋深為放船吾衰如杜老吟罷意茫然登絅卿弟東樓南風送花雨攜客上東樓遲景兹多暇微涼兼似秋雲空吳望濶草緑楚騷留眷此連枝會高吟愧昔遊題醉學士天上歸來老集英醉中嵗月漫崢嶸先生不是髙陽侣自笑三閭説獨醒别友人殘燈明曙鼓晴鐸報春城月出銀河隱林開鳥雀鳴故人憐易别舊事笑難憑寄語今年去休忘管鮑情贈郭生郭郎人盡笑髮白不憂貧賣藥來通市分錢與餓人洞簫飛月夜郢曲度陽春有客渾曾識休論見面新聽琴嵇康昔疏放孤桐托竒音陶潛自曠達空撫無弦琴君懷廣陵曲我愛柴桑吟那能悅俚耳所貴崇古心喜張處士枉過次韻答意詩客春殘病未興白頭漫興秪如曾江蘺彌望空憐晚甸麥緣貧稍藉登間伴海鷗浮浪蕩醉過鄰叟對鬅鬙幽情更愛玄真子漁父詞工和未能别王南原憲副相送曹門道離情秪自憐西風吹汴水南客問吳船佩劍明秋日鳴笳入暮天遙知彩衣樂猶及桂花前次韻答丁茂才有道丁度青雲器窮年對古書文辭殊秀雅風骨宛蕭疏賞合涓金重音稀郢曲餘吾衰慚狗監徒爾識相如春日集八弟鵠舉園用韻二首春遊便野服翻覺厭鳴琚緩步新開徑間看近得書何心嬰世網有客待公車好在莵裘老無勞更卜居池芰亭新蓋風篁戛素琚清標吾獨愛疏節客曾書雞黍招同社兒童候小車春園幽勝在差擬浣花居放舟疊前韻書絅卿弟扇頭春水才容棹松風暗學琚酒從彭澤醉詩倩阿咸書已乞仙人藥深辭長者車那知林薄外亦有老農居松鶴軒贈處士蔡良翰西軒棲隱處松鶴與人間素節終相保冥飛豈易扳瘦寧知衛祿清不受秦銜子和孫枝秀還渠藉好顔挽詩凱風悲棘心萱夢杳春深陟屺迷長望鳴琴眷好音膽丸劬栁母羊棗泣曾參寵渥年來下哀榮出華陰竹齋為劉尚絅題美人居傍竹西亭氷玉相看眼更青伺鳳翔鸞渾未解軒間試亦鼓湘靈雪夜與鵬舉弟過禪房夜久真消雪水茶聽琴觀奕共燈花當年幾許留詩在不向山僧問碧紗堂上曾分佛供茶憶僧遙問木蘭花相逢更愛毗盧暖笑煞塵途抗帽紗東樓夜集得銀字絅卿弟宅秋盡江南訪隱淪江南風物總宜人洞庭橘綴山頭錦笠澤魚拋水面銀詞壽沐國公詞今年冬十月草三日玉岡先生逢其初度者適三十年而豫萬里來滇得稱觴致詞為夀亦一勝會也顧聚合不可常而玉岡仁靜宜老夀後三十年豫東西南北未可期也而年年生日縱令一歌此詞公庶幾憮然興懷猶如東田之在座耳詞之調為金菊對芙蓉黃綴庭槐碧收營栁朝來畫戟霜凝更煙霏瑞腦日麗雕甍華階鶴舞南飛曲降阿母青鳥低鳴又何須用金貂換酒銀甲彈箏相共祝取長生記當年此日光嶽鍾靈喜干戈將印不負蜚英舊家燕子歸來慣見滇海萬里波澄羣仙道是人間元老天上長庚送朱思齋詞并序代作伏以國家惟用賢以養民守令必親下而獲上雖豪傑之士不待人興顧公輔之階亦由譽召恭惟寅長朱老先生大人閣下天才挺異人望歸隆世承折檻之風夙纘考亭之緒蜚英兩制伯仲聨芳出宰一麾江淮嫓美下車伊始遊刃有餘崇儒儲歌鹿之需閔農切書蝗之警均田之議方劇而持志益堅行水之智既殫而成功永賴防危則重投石超距之賞化俗則嚴珥筆教訟之刑誠信下孚聲華上逹氷檗之操允出臺評夏楚之施奚嫌輿議某等叨居僚二與有榮光睹薦剡之屢騰知徵車之孔邇久陪宴笑欣聞三月之謡宿荷帡懞懼失二天之庇敬裁鄙製用作後徵詞之調為喜遷鶯琴堂新霽正涼入薰絃潛消殘暑帝日中天郎星分野望極碧穹如洗蒲境謳歌滿路潘縣春風桃李相看取問東君政績前賢傳裏剛喜應秖是柏府嚴霜解作花封雨竹馬迎來花驄催發江郭放教容與屈指瓜時易即棠樹垂陰曽幾頻向説繡衣行部爭留好語贊雲安胡君遺像贊湯溪胡君以邑博卒于官其友東田子題其像曰三丘崔嵬維君之姿雙溪漣漪維君之辭肆仁以靜亦淵以思何實修而譽卑嗟負大而小施賞音難逢值數或竒懷哉雲安今其已而嗚呼噫嘻道崇繜絀守尚谷溪稚肅蕃儀雁門鄙規融獨沮膺壤遭孔嗤胡殤匪彭胡陵不夷繄君陶鑄無私躍冶多乎顔化弓裘罔斁過庭嘉乎鯉趨典刑猶存庶幾來兹東田遺稿卷上
