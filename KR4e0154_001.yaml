body:
  text: 東田遺稿卷上明張羽撰詩早朝偶作丙辰春登第後二弟鵬舉下第南歸因懷之曙色初臨五鳯城建章宫外聽啼鶯紅依御水桃花淨緑壓宫牆柳葉生退食從容當日午趨朝遲暮自天明潞河南下歸舟急不盡池塘春草情奉贈柴墟儲公儒雅當年定可師相留一醉亦心期宦情多暇詩頻擬秋興堪悲菊未知病喜家兒能檢藥靜憐簷鳥不驚碁身應萬仭青雲上滄海明珠幾注思贈冒武昌南還五十巖廊定不遲黑頭郡節亦相宜玉除曉日瞻龍衮江夏春風廢繭絲門士無書通薦藁野人有祀到生祠歸舟千里衡湘水眀月清秋總入詩奉贈胡少參先生督餉陜藩霽色望秦山春雲過渭川辛勤憐去國老大獨籌邊相國功重問司農位久懸清江留舊業此意亦蕭然任城太白樓山城煙栁護春寒太白樓前送曉看故冢生愁虛采石舊恩和醉對金鑾登臨有興妨多病流落難逢笑冗官莫信江湖輕逺適憑髙我亦望長安邵伯湖寄柴墟先生湖口餘寒駐客舟鄉園猶是數程留短檠遲柝悲今雨丹闕青雲感舊遊飛鵠正酣雲外路浴鷗猶眷水中洲當時萬卷空多興通籍金閨誤見收次韻答朱楚英北來鄉思漫能禁寒盡燕方雪正深日下啼猿驚泣玉眼中流水憶鳴琴浮生誤覺邯鄲枕緩頰慙多相國金明日定堪重獻䇿長沙已動賈生心三忠祠詩次韻淮陰方太守諸葛武侯驅馳曾喜出南陽魚水猶懷聚一堂拜表宫中無故主墜星原上漫埀楊三年後死功須定百務勞生敵解量莫恨馬曹終竊據荆徐不得失雲長嶽武穆王嶽王旌幟眼中空精爽褒公與鄂公萬里山河聞叱吒千年廟貌識英雄猶看汗馬回生氣須到黃龍立戰功誰誦辨誣成浩嘆兩宫哀怨更難終文丞相秋日文山冢樹蒼舊君報死亦尋常羣疑未白亡元日萬里猶歸侍帝傍東海無家兵已盡南冠不免死猶光燕京祠廟靈風急社鼓神鴉滿夕陽嚴陵曉發次夏嚴州汝梅韻三首官舟夜並越溪行已判青春付客程出嶂漸分嚴瀨曉聽鐘新識建山晴東來白雪明江縣北望紅雲擁帝城三輔未應愁逺適漢庭須亦試蕭生承恩誰賦內前行逺客來頻識水程一鳥波間間上下數峰天外忽陰晴山林不解南風曲裘馬猶矜北斗城莫向春明門外别大梁賓客望班生春陰強作問耕行出淖猶堪載酒程每厭蜃樓乘海暗定知爝火忌天晴山陽地濕茅穿徑雪後江髙水到城病怯官忙無暇日銅章錯憶緑紋生送周仲鳴使歸二首次夏嚴州韻猶是行春隊裏仙聞名未勝見時賢交從暇日酬知已飲託雄文紀盛筵出郭圖書留近驛隔江燈火候歸船送君便重思前度不道長安逺日邊使回意氣望中仙曾喜風流入晉賢旌節暫看勤傳舍國風猶待獻經筵星辰北極三秋夢冰雪東方萬里船遙憶趨朝馱瘦馬珮聲夜過玉河邊西坡為程正夫賦石路縣孤墅村居倚夕陽過山窺昧谷望日認扶桑曉圃葵榴競秋田粳稌香東坡近為政欲避蓋公堂贈徐景禹進士徐郎久别亦何如笑共燈前謝起居老杜詩多看峽後阿蒙賢勝在吳初慰言聊致民家語病客都忘舉業書莫厭相留成坐久獨憐逺地故人疏登石碁枰山昔聞二仙侣對奕此髙峰日月推移外乾坤勝負中冥心孤鳥過撫掌四山空應有傍觀者猶憐著意工過柴墟墓千里江淮秋色闌九原松柏晚雲攢愁經墓下辭房琯誤過州西哭謝安宿草自繁承淚遍長楊空撫賞音難孤舟明發夷陵道空對晨星曉月殘壽何篤齋七帙壽星卿月照天中春曉樓船過永豐東閣襟期同汗漫南塘風日好從容鯉庭玉樹連枝秀鸞誥金花奕葉封曾共少年矜傅粉白頭林下各成翁贈林生歸嚴陵生從蔡霞山授春秋余與偕至南岩月餘辭去憐君風格出璠璵二十工文衆不如奏賦定知觀國早聞詩曾及過庭初遙隨博望浮靈境頻扣中郎乞異書憶得問名猶少小南川堂下揖青裾閩中九仙觀用李惟正杭世卿二卿長韻二首尋真初識郭門山二月春深古觀間仙去碧桃空錯落客來黃鳥故間關經樓出堞看潮坐道院迷雲認樹還更羡留侯能辟穀只從松子住人寰荒碣依微認晉唐荔枝榕葉暗回廊峰霞晚結燒丹氣澗溜春寒煮石香雲外紫壇穿樹覔林間瑶席拂花張夜歸欲假仙遊夢只恐靈修吝發藏壽丹山屠都憲先生三朝爭識舊容儀晚節重恩荷主知分座貂蟬看故吏朝天珂馬共佳兒都堂再入人皆仰新法難平迹已危憶對南山傾壽酒年年應記菊開時吳銀臺宅食桃魚云出尚方為作一律御苑仙桃出絳閽恩波兼飫賜魚芬桃從武帝筵中降魚是文王沼內分幾度著花供餽與定看濡沫惜殷勤報璚未足酬珍貺在藻還同祝聖君弔賈長沙嵗晚長沙路懷賢弔賈生翔鸞秋自逺妖鵩夜還鳴禮樂思周旦憂疑過屈平霸陵無日起湘水至今清玉岡宅同劉松石道長賦海棠用唐人錦瑟詩韻二首梅花零落入新絃蜀海棠猶早占年埀蒂最先迎戲蝶落紅應不到啼鵑香微賸許呼仙侣艷冷如知避瘴煙滇中此花正月盛開為道玉峰春意滿更看桃李共依然生憎羯鼓雜鳴絃忽對花叢憶去年嬌艷真看如中酒返魂應解逐啼鵑湖山靜夜深憑月燈火回時小障煙剛被東風輕喚醒尚饒春睡欲茫然送劉松石歸黃州玄都舊逐看花仙憶道重來樹滿千同畏簡書行海外劇愁戎馬共燈前是時滇中傳言官軍逐劇盜劉七自襄湖順江而下才名避地應三舍齒序先君漫十年却送歸旌悲故里幾回飛夢郭東田夀孫母太夫人院君年老髮埀絲健態怡顔似少時霞帔承恩延晚慶斑衣回笑慰重慈謝家玉樹迎春滿王母蟠桃度嵗遲只與鄰姬同甲子賸多賓客頌螽斯德州道中次北潭先生贈别詩韻南雁飛時燕已西髙林欲靜逺山低流年暗裏看逢酉歸路秋深喜過齊問宿隔鄰分火照出關隨伴候雞啼病來端覺詩情薄懶向郵亭續舊題次韻送林先生時名江左薄夷吾皎日中天藉手扶盛節酬恩盟帶礪長生乞藥問蓬壺三邊控吏遙迎馬五月歸旌忽載途闕建溪楊太僕陶園陶園想見古人情采菊看松趣日成遺世自禁彭澤醉為官剛悟馬曹名仙溪九曲遙穿徑奴橘千頭晚傍城欲命巾車來入社豫從詩卷訂前盟投贈延平歐陽崇道棄官歸廬陵龍津孤月下城初荒洞長風拂袖餘閩海去時逢荔子楚江歸日到鱸魚浮榮屣脫二千石舊業珍藏六一書猶有郡人懷舊德闕用韻送李懷德進士歸建寧冬殘歸計屢移旬漫擁干旌送逺人燕市酬金逢駿馬郢歌希和到陽春賓筵欲别情還戀世故相看懶重陳却對梅花官舍晚憶君標格恍如真贈聶鳯山都憲之南贛薇垣左轄稱循良柏府中丞重激揚兩月追隨傾洛下十年風誼憶滇陽涓人駿骨初逢賞漂技侯封漫購方今日須公如小范會應威德靖炎荒同王龍湫翟青石遊梁園押韻賦詩仍各賦一律官間幾日惜浮生弔古尋幽燕集成梁苑有基空梵劫杜鵑如訴答鶯聲汴人不識鵑聲余始于座上聞之上方開霽鐘先報髙樹迎秋葉盡驚總為文園愁病在子虛遊望不關情人日次韻李崆洞幾日關人事陰風黯鼓􅎏諜回聞野戰齋卧匝鄰啼積雪冥鴻逺輕陽太白低元戎頻送捷有待頌淮西挽大行吳年兄勿齋昔從秋宴鹿鳴堂曾共歸舟問北江前輩文章推巨筆往時燈火憶同窗二雛風格祥麟並八月星槎畫鷁雙我憶九原招不起紫薇花下獨眉龎雪中送王一江少參之廣好去王公子離亭共此杯望依鳬舄逺興憶雪舟來越徼占行色梁園惜賦才天涯獨寥落猶喜暫徘徊送劉西陂巡洛劉郎相見晚悵别坐天明春雪那能急泥途不可行冥心通紫極灑淚對蒼生同是看花客因君百感并草堂雪霽為樊雙岩賦先公昔分閫曾此駐旌旗柏府良弓後茅堂肯構時原光搖霽雪河響坼春澌樂矣南滎曝吾君恐未知送萬安然歸南昌黃花落盡亂鴉啼聞道仙舟傍晚移江邑秋殘驚客久故園春在夢歸遲馮歡心事無魚鋏毛遂才名脫頴錐我亦無人識名姓對君慵寫送行詩黃潤夫别號松亭為賦一律咫尺徂徠有路經萬松行裏寄幽亭曉寒枯硯研零露春暖虛窗嗅茯苓石室可招丹鳳下草廬誰喚卧龍醒清高我愛黃公子座右新題晚翠銘使節榮行代儲柴墟作贈焦宗伯分韻開字排律瑞日氛煙靜祥春淑氣來蒼龍隨警蹕丹鳳舞蓬萊道泰諸靈協仁同一視該履端均朔裔布澤到寒荄玉牒分藩盛金縢册典開眷言懷睦族簡命重掄才宗伯三朝舊時名兩制魁誦詩元浩瀚束帶久徘徊染翰終投筆和羮待作梅九遷躋鼎鼐三錫賁泉臺詔借皇華節恩看宰木培遺羮翻謝穎建鉞衆多裴野水星槎度沙堤晝錦回泌清同照耀嶽峙藉崔嵬鶴壠焚鸞誥龍章動蝶灰幣陳中帑綺尊注大官醅湛露霑封草需雲覆奠杯寵華詞客賦燕醉里人陪令子休歌棘先公舊植槐鄉遊花正好國計驛還催咨度行須遍詩篇定易裁歸囊發大雅願擬贊康哉寄于文祥十載同書硯于今恨不平青雲未得意白社漫馳情韓子檠猶焰馮郎鋏欲鳴作詩聊寄舊風月助凄清中秋次柴墟先生韻二絶卯嵗離鄉歷丙辰無端歸計只逡巡長安亦有江門月今夜清光冷照人好懷對客醉佳辰頻教家兒數酒巡欲去且看花上月秋光深處易留人慧河寺留别同鄉金上人旅懷寥落寓京師山寺逢僧是故知兩月都忘為容日草年能記出家時夜堂觀奕金蓮盡秋閣聞歌玉樹悲明日移家定何處藤蘿寒月照相思領淳安柴墟席上留别贈行諸公長安傾蓋荷先知投贈今宵賸有詩水國山晴舟去逺春明花早燕歸遲坐殘曙漏猶高咏數過韶華滯去期最是玉河堤畔栁依依偏向别離時黃潤夫北山新居小徑城陰繞薜蘿瓦盆相對長高荷花深山鳥時還下地僻儒紳暫亦過草色雨亭生畫景爐香秋院引絃歌分明蕭散紅塵外未必仙居定若何九峯北潭二老同日報罷九峰高凌雲北潭清徹底我遊遍京洛寓目惟有此峰髙更無鄰小草不成美潭清足空洞鑑見衆形穢陰霾忽朝暗風浪兼時起衆人恐波及吾心恆仰止楊家侈氷山奉高空沼沚雲開潦水盡萬古此流峙至日寄都下故人二首冬至山陰暖氣微五更廳事動朝衣雞聲衙吏來應早雁足鄉書到亦稀天上星辰雙闕逈江邊氷雪寸心違寓遊正憶窮愁日薄晚東齋坐不歸至日今年更越西京華遙望眼先迷朝衣待曙悲新約吟燭爭寒憶舊題簷外氷霜愁自痼山陽煙霧喜同隮宦途未暇滄洲逺何處浮雲不定棲元夜奉次篁墩先生韻今雨相逢是上元一樽殘漏未辭煩醉眸歸送鰲山盡離思春憎錦瑟繁北斗高居縣夜直南山孤興倚秋園十年曾是西莊舊圖卷依稀憶贈言春雨輕風遞遲折春夜苦復長脈脈夜來雨如縷縈羇腸撫卷不成讀篝燈熌餘光渺矣望故園帝鄉復何方伊昔年少心屣脫聲利場紛如睦下吏晨莫徒皇皇佳遊劇遐想吏隱良參商拊心愧江雲濯足悲滄浪既乖齊竽調徒抱荆璞傷侯封亦漂技千金購竒方西燕正低掠北鴻翩回翔物候轉目新塵顔非故常駕言阻歸牽昨夢勞悠揚懷哉紫荆樹連枝發幽芳况兹飢饉餘祿食慚赬魴明朝一雨霽南陌行春桑宫怨清秋宫月照窗紗重捲珠簾望翠華咫尺昭陽恩不到鏡中容貌枉如花贈徐生徐郎二八能文字暫負秋期已恨遲可愧嚴陵江上客功名三十少人知次韻答莊二教志明喜君儒雅可吾師燕集山堂幾訂期盛際雲龍非偶事間情花鳥是深知才華自愧山公啓靜鎮猶懷謝傅碁淮海十年多舊侣蒹葭秋水正興思疊韻春歸溪口訊舟師猶悔鄉園負宿期臨事我慙程不識閲人誰是魏無知聞笳欲下清宵淚折屐虛懷勝日棊莫任江湖輕浪迹食芹曾切尚方思哀田家口號三月連陰四月過桑田無利有催科行人莫訝深山虎一入城中虎更多端午五月江村歸夢長又從客裏過端陽石榴輕閃風前色山艾時飄苑外香競水數舟那更急穿花雙蝶故多忙兒童不省官中好猶插朱符説故鄉病中口號三十功名愧獨難秪將多病付仙丹千金市駿應誰是萬卷焚魚正自寬緑野雲間秋稻熟青溪月淡夜魚寒遲歸已負滄洲約便信輕舟下急灘嚴陵晚泊柬同遊諸公客懷何處寄秋城欲與長沙弔屈平江上逢人皆社約舟中見樹問山名煙波日靜魚龍晚霜月天高杞菊清暫共建昌祠下泊上方鐘磬夜分明淮口擬别三弟文舉兼寄諸弟淮陰去路爾歸程欲寫愁心寄逺征雲塞忽分聮雁影泥途未出跛驢行三年去國身先病幾日思家夢亦驚傳與青春諸玉季辛勤三十愧為兄示楷憶從春燕共羣英鄉國虛傳甲第名千里氷霜心盡赤幾人萍水眼偏青他鄉得病悲妻子薄宦歸家笑弟兄誰判憂虞需富貴秖應江海老浮生早春行下邳青草山前雨未晞東風初解試春衣過淮栁短鶯遲語連海沙長雁欲歸舴艋雲中河水緑鞦韆畫裏女裳緋行人正漫西江興到處風光賞更違晚春舟中風光二月成虛擲客路三千鎮獨歸去國漫憐行日逺到家常恐見花稀燈穿夜舫春蟲入帆過晴沙宿鷺飛零落當時多少事東風江上欲沾衣嚴州天寧寺水南石上天寧寺春盡移舟偶自登煙樹霧花猶病眼洞雲崖月獨間僧樓高百里山皆出江近諸川瀉欲騰誰許宦遊誇勝覽鳳城宫闕百憂并茅亭思君千里問茅亭忙裏還能幾日登花重雕闌晴幕啓香凝礱石午琴鳴醉翁喜雨應陳迹放鶴沉香漫有名曾是檢書當夜坐會逢藜火訪更生題莊志明邑博扇面小景猶憶西池畔蓮開七月紅波明魚度藻莎碧鷺依叢客舍秋天外花期病眼中莫愁歸日晚正是剝青蓬喜張邑博振卿生子麟兒短絶以志星樓歌鼓動新秋傳喜麟兒誕月周我亦二郎如阿仲與君相對醉江頭秋興同商進士景貞押韻作離家秋晚自初春九辨年來入賦頻病久漸能知藥性途窮端欲問錢神詩懷似媚江花淡旅食全甘海味新莫訝偷間成夜醉定須疏散是吾真花期曾負曲江春搖落秋芳寄興頻蟋蟀生愁渾寂莫芙蓉何意更風神江邊病客終違俗河內凶年愧食新聞道蛾眉當北去漢家物色恐亡真露下江蘺緑似春寒潮西去打城頻青山舊鎖吳宫恨白浪疑歸胥廟神返照回鴉楸葉淨孤舟聞雁荻花新玉簫明月成追憶歸夢紛紛記未真花栁曾沾輦路春登髙誰賦黍離頻峽雲虛綰巫蛾髻湘水能傳屈子神萬里九重天闕逺千金一笑主恩新三郎亦自慚韋武猶有傍人笑太真御苑離宫不耐春夕陽詞客放歌頻當時漫意禪梁父何處宸遊訪洛神近侍寵多賓客盛腐儒憂在鬢毛新秋來亦有休文瘦欲倩傍人為寫真宵行嵐氣薄征旗溪風振弱澌翻鴉驚葉響吠犬覺花移村靜看燈近山深見月遲秋空蕭瑟在此景與心宜宿嚴州西觀次韻贈别周仲鳴水部才名曾喜動堯庭見領恩光賦出城幾日鄉音投客話九秋三館惜離情暫遲歸棹須明發定過前灘憶夜聽為有吳山堪寄逺侯郎知亦盛詩聲除夕同張振卿押韻作數絶官忙剛得夜深眠除夕它鄉更惘然貧病謾憐猶故態兒童浪説慶新年曾聽朝雞警獨眠午門燈火夜森然一官此日天涯外逺效華封祝萬年江閣疏鐘惱客眠俸錢酤酒醉陶然明朝况是正元節百嵗浮生又一年休沐寒宵正穩眠疏遲贏得髮黟然黃楊已受春功薄猶恐明朝值閏年嚴州新春用林南川郡博韻春到無多日孤舟細雨來近郊微見麥隔水忽看梅凍雪宵燈約殘更曉角催新年猶旅食未試豹燒胎嚴陵舟中值雪次林緝熙韻雪花交白日又共守庚申興助乘舟客愁添失路人隴梅猶遲暖塞草未知春村酒溫新火長年語自親咏雪次洪克明邑博韻春寒漸徑此舟中陳陳氷花度幕風野積遙看千徑合岸深只放一溪通平添新漲時兼雨寄綴高枝亦藉風小泛會應乘暇日幾人幽興得相同贈應文昭耆士六十青溪士迂疏白髮生舊家餘故老薄俗畏仁聲手種花都活爐燒藥亦靈里中推月旦猶不後諸兄題何大淵藏吕廷振畫雁金風力弧矢射獵紛健兒驚飛天南鄉悠悠定何之南人苦相求設囮橫中陂稻粱非所謀網羅不可麗瀟湘在何處夕月虛寒枝安如圖南鳥一徙棲天池翩翩上林間北海還縲羇長門度深夜屬我千金詞歸飛背江燕春秋以為期獨坐鼓瑶瑟會向柱行欹畫鷹田車不踏蓄菟叢鷙鳥何勞送澤宫知是漢皇仁鳥獸虞人解自慎縧籠縣令羅公初導新河邀與小泛因呈同遊諸公寓規勸之意得詩八絶日晚仙舟出逺林南風時共解煩襟行人要識蒙恩澤得與新河流水深官河晴雨紀巡遊茂宰新懷洚水憂猶有歡聲傳道里城中下令緩征求右呈羅尹海榴花過緑成林試折殘枝露濕襟莫惜飄紅低著地玉顔正少主恩深農時得共問耕遊只有村翁不識憂為語城中官府好近來惡吏不需求右呈楊丞楊有政譽官舟簫鼓競遙林倚醉波間一散襟九夏風光千日酒君恩翻覺暇中深齋休詩健足清遊玉食還同佐邑憂今日民愁公賦急晚絲新穀不勝求右呈蕭簿蕭時董賦晚潮新漲下西林小泛回時月滿襟昨日市墟多巨浪使君莫較酒杯深天間八駿憶周遊誰解千金破主憂定是龍媒能萬里涓人駿骨亦先求右呈靳簿靳時司牧贈别陳百一君從西州來未至動消息長步登我門顧笑一為揖江湖謝鄉音傾蓋如舊識殷勤寄雙魚為云柴墟客劍頭挂一書種種青囊録江山覽竒勝窮海遍蹤迹談玄出造化潛悟豈龜卜燒鉛期成金漫言河可塞耽奕日忘坐呼燈了殘局平生山水心半入瑶琴曲日來賣草書數紙充一食貨利輕秋毫只苦飯不足三旬惜言别挽之能信宿虀鹽不終厭緒言正堪續侵晨御風去盼望不可即茫茫水雲間頃刻疑地縮歸來舊山中猿鳴喜相逐傾囊發贈言顧笑若重獲看山得佳處為結數椽屋待我休官日會尋領松赤與陳百一押韻擬作閨怨孤房獨夜冷凄凄睡起眉纖偃月低數過佳期憎報鵲喚回好夢怪鄰雞紅顔