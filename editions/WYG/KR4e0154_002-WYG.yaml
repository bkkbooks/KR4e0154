body:
  text: 東田遺稿巻下明張羽撰奏疏劾劉瑾疏江西道監察御史臣張羽謹題為陳言時政事臣無似待罪言路才識淺陋無所裨補謹昧死上言臣聞創業之君必先於體統而守成之道尤貴於持循洪惟天朝太祖髙皇帝奮起元室之季百戰間闗以有天下肇造之初延訪忠良任用賢知集羣謀而稽衆長以定畫一之制諸司臣工咸有職守内外大小勢相維屬而又設司諫之職立風紀之官求以開廣聪明糾察姦宄樞機宻而防範周體統嚴而規模逺内治既正外治亦張聖子神孫萬世帝王之業肇於此矣厥後列聖相承有隆無替逮孝宗皇帝益隆繼述之道天資明而好學問聖志鋭而恤人言敬天勤民法祖為治接大臣以禮使羣臣有恩爵賞威刑率由公道征歛興作動合經常十八年間朝廷尊安海内殷富中官私人不聞干政鄙夫邪類不聞肆眚古稱二帝三王之治不能過也天禍臣民先帝奄棄哀號思望四海同悲陛下以英妙之年履至尊之位方在諒隂羣心懽戴以為陛下必將大興維新之化以光先帝遺烈奈何小人當國䝉蔽聰明至理難臻侈心易肆陛下有乗龍御天之資而羣下不能成其美陛下有馳馬試劍之習而小人得以售其奸遂使政事舛訛膏澤罔究仁賢解體閭閻拊心葢五年於兹矣所以然者豈以先帝之美政非當今之所宜行而今日之人心頓異於先帝時也良由任用小人之弊耳臣切見司禮監太監劉瑾鬼蜮其形虺蛇成性剛愎自用隂很害人挾主威以令羣臣任已私而亂成法凡其設心蓄慮動為國家天下之大蠧陛下不覺其奸以為能事寄之心膂假以柄權故瑾得以縁法為奸怙恩妄作目不識文字而謬儗綸言身不諳典刑而恣行威賞祖宗以來百五十年綱紀法度規模體統蕩然無幾存者迹瑾奸邪誤國之罪難徧以疏舉姑言其大者則陛下初年以勵精為治而瑾導之以不常視朝陛下初年以純孝為心而瑾導之以不親饗廟陛下初年以繼承為念而瑾導之以不得入後宫凡此三者大政所闗國本攸係而奸人蠱惑之禍亦基於此也至於大學士劉健謝遷尚書劉大夏韓文等皆顧命大臣老成忠亮先帝簡任以遺陛下而瑾畏其軋已不利行私首先去之是使陛下不得用舊臣也給事中戴銑劉􅉅御史薄彦徽蔣欽等忠直敢言為國不貳先帝涵養作成葢非一日而瑾惡其剴切攻發已過悉屏逐之是使陛下不得聞忠諫也入覲官僚黜陟臧否親民之任故嚴其考也一貪其財賄則拘留過時而幸免者得以中㫖復故職登科進士甲第等差事君之道貴正其始也一私其黨與則恩榮破例而倖進者至以傳奉入翰林武舉以儲將材而中選者悉投之於逺卒有緩急誰其應募招商以實邊儲而入粟者皆繫之於獄卒有㐫荒誰為轉輸芻粟之腐壞無問監臨主守倍數追償故有貧不能給繫獄經年名為聚歛實為歛怨也官吏之犯罪無問公私輕重一切罰米故有累犯重科積至千石名為儲蓄實崇禍也抄沒之刑槩加於薄罪而中人之家籍其貲財動以萬計多取辦於有司枷號之辱濫及於大臣而無知之民横屍都市何啻千人類多罪不至死沿邊諸軍苦於屯種日不聊生加之丈量陞科之擾是激其變故也逋逃軍士迫於饑寒勢不得已重以里隣連坐之法是絶其生路也有捕盜之功隨以都御史之賞而必責其親冒矢石徒足重傷國體耳殊不知征歛之政急則摽掠之徒興捕之其何能止惡健訟之俗則削其鄉貢士之額而又限其不任京官徒以犬咈人情耳殊不知羅織之獄興則告詰之風起禁之其何能息始而提人駕帖勤於公府之文移繼之行事校尉猛於催科之胥𨽻則朝廷之威近於䙝而民間之害日已滋矣凡此數端率皆時弊不近人情行之而失天下之心傳之而詒後世之誚非祖宗之法而不可以為治也而瑾且招權攬勢任意據援苞苴盛行營作無已甲第徧於京師貨財豐於内帑吞噬民業撩亂萬家發掘丘墳狼藉千塚虐及枯骨毒流窮閻然人心知尊朝廷故畏劉瑾門户之禍雖酷為身者不敢怨父兄之讐雖切為家者不敢言傷天地之和召水旱之菑皆由於此陛下中其奸謀不加詰問委棄政務専事般遊既不得讀書以監戒前古又不得閒暇以思惟治道旬月之内一再視朝或至日昃百司之章疏不經於前四方之休戚不煩於慮陛下樂於便安無所拂迕遂以劉瑾為真能忠勤謂諸臣為徒事煩擾臣愚以為章疏不聞則朝政無由而理休戚不闗則民困無由而蘇躭於晏安則虧損至徳過於遊騁則罷勞聖躬凡此之為皆瑾之至利而國家天下之至不利也臣竊憂之方今吏治尚慘刻士風競奔趨君子小人相為倚伏今日之所用率非前日之舊人間有一二老成才智茍非以緩急赴召則必以羈縻勉留出入伺候於奸權之門大官拜于前小官拜于後納忠効力如事所尊峻法深文茍圖自結故劉瑾欲賞一私人則公卿百官僉贊其功欲罰一私人則公卿百官羣摭其過而在外有司觀望風㫖曲意逢迎故民命已急而有司視之皆罪人民力已竭而有司視之皆富室今公卿百執事皆失其職四民之間皆失其業而瑾之威虐日益以甚中外憂危莫不股戰脇息以為禍將及已譽望隆者慮逺害蓄積豐者謀全家其有不然則胥而為非矣臣聞山東江西福建兩廣以及京畿之地盜賊縱横而荆蜀之間騷然靡寧去年遼東軍士被甲攖城北邊用兵輕䘮總制而寧夏之亂變起宗藩實非細故雖復殄滅損失良多而强寇劉烈蘭四之徒擁衆稱雄志不在小是皆劉瑾稔惡長奸開可乗之釁以招之也然瑾不知其罪而顧以為功不知其可憂而顧以為得志非智有所不及所利在此也寘鐇之叛瑾實啓之幸而天亡瑾身受大賞復推恩以官其兄至為都督夫以劉祥閭閻小人卑鄙庸劣一旦因奸弟之勢夤縁至此則平江伯陳熊元勛之裔今雖有罪固得以法宥也陳瑄有功而敓其後劉瑾有罪而官其兄賞罰如此非所以令天下後世也夫罰不遺大奸則人心服國不私近倖則事體安今宗藩為其激變乗輿為之震驚而元惡大憝招釁啓禍如瑾者顧迺恃其敏巧佞説安享富貴侈然自儗於至尊而患不及此天下之人所深懼大駭莫可得而知其由也况今之髙官顯職多用私人引類呼朋布列樞要瑾身為人臣已有南陽近親之庇迹其今日髙貴已極勢不能復為人下而又厚自封植隂蓄異圖廢格詔書益行荼毒衆方憂其必為不利而為其積威所刼莫敢告言臣為陛下計必去劉瑾而後人心可安國家可治而為瑾之自計茍無他志則不當專權固位乆處至危之地而使人疑之也臣聞古之為人臣有功而無過莫如周公周公以諸父之親冢宰之尊而元聖之資也武王沒成王幼周公相之不自恃其聖智吐餔握髮以延天下賢人負成王以朝諸侯制禮作樂身致太平周有天下多周公之功也然而一遭管蔡流言退而恐懼遜於東山不敢安居以為勢有所宜然耳今瑾非親非尊無周公萬一之功而狹險倨嫚浮於恭顯訓注之惡在朝疑之天下怨之而乃矜功伐美恬不知畏此其中必有不可測者此臣之所謂危也臣願陛下試一思之先朝用儒臣則不見今日之亂今日用劉瑾何以無先朝之功則忠佞邪正斷可知矣固未有舉世之人皆欺罔不肖而瑾一刑臣獨忠且賢也然瑾之奸邪其最不可恕者惟其假威濟私不顧國體顛倒錯亂朝令夕更瑾亦心知衆怨羣怒禍將及之間則上章乞休外示遜避而中實貪不能舍至於中㫖慰留陳其功烈加以賞賚即其詞意葢若大凡國政之妨吏民者皆出朝廷而其更張轉移皆由於瑾是瑾以怨歸君上而以功歸於已欺罔厚施之罪不容於誅矣然而天下之人皆知瑾之䝉蔽而日覬朝廷之開明故彼倡亂之黨動以除瑾為名而中外人心亦以去瑾為快陛下何不一因人心之怨怒選數瑾之罪惡而置之於理令其將京城内外私宅莊田凡有幾所悉皆報出計其營作之工木石之費凡用金穀幾何計劉瑾所得口糧及恩賞禄米自有常數其餘蓄藏糜費之物從何而來則瑾之奸欺自不可得而掩飾然後昭布中外與衆去之别選良實内臣以備左右任使大開悔悟之端以彰平明之法悉去舊習與民更始則中外肅然天下稱聖主矣設以瑾為從事有年不忍加罪則當收其政權寘之閒散以絶禍基仍勅文武羣臣或有大政則僉議於朝不當猶前依附私至瑾宅隂助奸謀其或不悛即為奸類是亦陛下寛假之一術也臣竊謂劉瑾今日之不改為惡譬如騎虎勢不得下朝廷今日之不去劉瑾譬如養虎終將噬人失今不去雖有知者不能圖其後矣凡臣所言瑾之奸惡乃其什一在朝之臣葢有知而不敢言者自謝遷等之去與戴詵等之獲戾瑾復受計姦人阻塞言路以為䝉蔽作奸之地中外以言為諱間有奏疏則皆先受指揮非排擯忠賢則更張制度也近而左評事羅僑幸一言之輙得罪以去繼而都御史黄珂左通政叢蘭亦一言之復為言官所論臣固知今日言之明日必為劉瑾所中傷禍不旋踵甚無益也然身為王臣復有言責仰慙國家養士之恩卒無裨益邇因憂憤觸心積為疾疢使一旦發狂以死固不必以言得禍也吾君在上祖宗先帝之靈在天死生輕重之間臣籌之熟矣伏望陛下以天下蒼生塗炭為念以海内豪傑觀釁為憂以宗社乆安長治之道為計臣言可采即賜施行則時事猶可為人心猶可保而上天之意猶有可得而回者矣臣干冒天威不勝戰栗隕越之至縁係陳言時政事理未敢擅便謹題知伏候勅㫖地震疏據楚雄府經歴司呈承本府照㑹備隂陽學隂陽生楊復初呈稱正徳六年四月十六日寅時自東南起去西北地震如雷吼卯時復震二次至本日午時又震三次十七日微震一次十八日午時又震一次將房屋瓦片牆垣甎石動搖脱落等因轉呈到臣續據雲南布按二司經歴司呈各承奉本司劄付照㑹准守巡洱海道咨闗及據楚雄衛經歴司呈俱同前因㑹同鎮守雲南總兵官征南將軍黔國公沐議照地道弗靖菑異匪常除㑹案通行修省外臣竊惟地震之變其應非一考之傳記為嵗饑為寃獄為兵興民勞為臣下專恣為小人道長大率隂盛而反常故應以震動所謂越職專政是其咎也然或震於一方不見於他處則猶疾痛之在人感之暴者發之偏耳煩於聴有時而瞶目勞於視有時而矇受病專也雲南之地去京師為特逺安危休戚卒不易通是以惠澤不先加而苛刻恒首及焉以逺故也自頃以來年穀不登横歛益急民竭其力地竭其利匹夫不獲相率而為非今其山林郡邑之間盜賊滋起而隴川安南之司巨酋跋扈兵禍相連特為慘烈較之隣境貴州諸省兵荒之患實亦不殊而京師不之聞也今年春夏之間旱熯尤甚而地震當四月之期適為㐫年之候天時人事皆反厥常民病已深不可救藥臣愚竊意由今之勢積而不解所謂隂乗陽弱勝强之應已為不虚不必更有他變而後為異也然而當路不加憂守臣不見恤方物之求急於民瘼禽鳥之愛恩於夷䝤私門之横歛倍於常賦雖一二同事捄正之意固不能無而輕重之勢實不能較將如之何臣謂道隨行乖氣因事逆菑變之興猶將未已也臣猥受國恩叨列言路兹復謬膺巡按之寄遇菑而懼莫知攸為其於舉亷仁抑貪戾慎刑以重民命節財以厚民生與凡職分之所得為固不敢不勉竭駑鈍粗效涓埃至於察專恣之萌杜羣枉之漸憂不測而防未然則有非臣下之可得而與聞者臣不佞竊謂此在聖心感悟之間耳伏願陛下懲創往事推廣善端召用老成之臣旁求忠諫之益扶植陽道遏抑隂柔法健順之常以建中和之極使天下臣民皆知易轍而改塗安土而樂生重念逺方之人使其呻吟疾苦有所控告特勅各該守臣留意撫綏期於安集毋或襲為掊剋之風重其倒懸之厄申勑藩臬諸臣令其宣揚徳意通達下情務寛一分毋為沮撓使夷漢之間有所依附各官之中設有方命虐民任私僨事聴巡撫都御史及臣等指實糾舉示以威嚴以彰平明之政若臣等失職曠官付託不效則國家斧鉞之下固無所逃罪也臣不勝區區之忠身在萬里之外憂病交并縁地震事理除隴川等處事情另行㑹奏外謹强疾條陳地方利病四事開坐具本差承差楊楷親賫謹題請㫖計開一清利源以蘇疲困臣切照雲南地方原有新興等銀塲九處嵗辦課銀伍萬貳千叁百捌拾兩原撥採穵軍夫壹萬玖千貳拾陸名除前該巡撫都御史李奏減銀貳萬肆百陸拾兩減去軍夫壹千陸百貳拾貳名其餘軍夫壹萬柒千肆百肆名辦銀叁萬壹千玖百貳拾兩節因鎮守内臣自令京官人等分管各塲招集義夫採穵侵剋入已偽稱礦脉細微嵗課不足遂將軍夫口粮折辦及令乾認銀兩今計一嵗課銀礦塲所出不過叄千之數而軍夫折辦乃至貳萬捌千餘兩而加耗糜費實倍之臣愚竊謂礦不可求諸人之身而出於人之身不謂之礦今乃令其鬻妻子竭膏血以償之非所以利國家也况今各塲礦脉不至細微但因京官分管先入買塲之資後收管塲之利故礦銀悉歸於私而課銀則辦於官也滇人有言京官管塲重取之軍夫而不足設令他官督管專取之銀礦而有餘臣已㑹同鎮守總兵官黔國公沐公同都布按三司各掌印及守巡等官熟議外伏望聖明勅下該部計議前項銀課嵗入不多而邊方窮困益甚合無將各該礦塲比照福建等處事例一切封閉免其辦課少紓數年之困若嵗課必不可無採辦必不得已則查照前巡撫都御史呉巡按監察御史陳各奏事情轉行吏部查照舊例選除素有風力亷能方正僉事一員前來専管督令義夫採辦務令逐年完課不必經由鎮守内臣將辦納軍夫放回操備庻幾事定而弊除課完而費省實亦可為也及照雲南府羅次縣大橋馬銅塲一處近亦指言銀課不敷軍夫故絶奏行開穵謂以銅塲所得之資補銀課不足之數其實則彼盜銀礦而不足又舉此以益之也况其地四隣蠻夷利源一開釁端隨啟既無近利或遺逺憂亦宜通行查禁封閉以絶後艱二害既除百姓安業弭菑消變之務莫有急於此也二乆職任以節浮費臣切照雲南地方萬里藩維四隣夷裔地偏而勢阻土瘠而民貧近嵗以來鎮守内臣更代頻數跟隨官舍又復衆多一至此地誅求太急民不能堪迨及一二年間所欲既盈上下差定而奄忽之間復又代去前行後効率以為常送往迎來迄無寧嵗臣愚竊謂彼一更易既無増益於民徒爾重其勞敝故逺方之人習見其事始而懼其來終而懼其去為其苛刻必不能免爾事勢如此非所以保疆圉而安黎庶也伏望陛下軫念窮邊重遭荼毒合無今後差遣内臣到鎮若其暴戾貪横及縱令官舍肆為不法者聴巡撫巡按官員指實奏聞定其去止其有稍循禮法粗效安靖與民相宜者聴其乆任不必數為更代重其送迎之費必若始雖歛戢而終乃背弛然後易之如此行之既乆庶幾民心不違而於國家之大體亦無所損弭菑恤民之道不外是也三罷冗員以寛民力臣切照雲南雖云一省然地本荒裔夷羅所居財賦物産不及中州數郡之富而金齒騰衝又其下郡也特以逺而傳聞以為富爾實不然也本省原設衙門除監司等官外復有鎮守内臣一員總兵官一員巡撫都御史巡按監察御史各一員事體相繼法制已備可以萬世行之而無敝也後因罔利之徒開端作俑復於金騰地方添一内臣鎮守夫以一隅之地前數臣者統而治之為有餘閒而供億廪餼糜費不貲固為食焉者衆而民力不能支也况前後數人亷静者少一人之來衆人隨之於事無少禆益而實有大害存焉近而太監張誠激亂之事可鑒也查得前項内臣屢經奏革旋復添設此其來非真為地方保障計也今軍民之困尤甚疇昔若更任之不去臣恐將來之患不但如前日而已者雖復嚴刑以繩其倡亂之人於事體固無裨補况蠢爾夷䝤有不可勝怒者乎臣之所謂乆敝之地已傷之民必不能厭其無已之求也臣愚伏望陛下憫此一方重遭荼毒特勑該衙門計處合無查照舊例將金騰添設内臣取回别用專令鎮守雲南太監兼管庶幾事體歸一而民力得以少紓而於國家建置之意亦不戾其初也四廣學校以變夷風臣切惟雲南古荒服之地人性桀驁前代以來竊據無常至我國家始襲華夏之風被禮儀之教漸變夷俗邇來農務於耕稼士勤於詩書土官夷人亦知有學葢前古所未嘗有也然先是學制未廣民間子弟與夫各該官生名在學官者或連數郡而萃於一處或總數衛而聚於一方以故教化未大行民風未至於丕變臣奉命南來行歴雲貴二省之地見其所屬衙門未有學校之處其人皆囚首垢面裸身徒跣服弓矢而仗干盾性狀獰惡不通語言間或設有學校則亦遵義循禮衣冠文物悉如中州臣是以知變夷莫先於建學而禮義之衛人雖之蠻貊之邦可行也臣節據六凉平夷等衛所霑益等州各申呈彼處官生人等各因附名别學道里隔涉不便肄業軍官生員皆願出貲捐俸助建學舍以便講習又可以見人心之向化樂於為善如此也况其欲為建學之意秪資教育不圖廪食揆之事勢無難為者臣愚伏望陛下特勅該部計議合無撫從其意聴令臣等從宜相度將六凉平夷等衛所相應建學之處即與區畫料理具實奏請建立學校増廣生徒選除教官鑄降印記其師生員名悉照各該府州衛所事例量為多寡生員既無廪膳亦得以常例優免科貢之年聴令赴考應試使有進身之階如此行之數年庶幾禮讓興行蠻夷感化固亦可以美風俗而固人心一時之勞萬世之利也再題地震正徳六年十一等月十二等日據洱海衛指揮使司經歴司呈并雲南縣申各據隂陽生邸彦剛張仲和呈各稱本年十月二十七日夘時初刻地震自東北過往西南隨止續據大理府鄧川州申據本府隂陽生孫贇道呈同日辰時一刻地震自北方起往南方復回北方止官民房屋俱各搖動又據鶴慶軍民府經歴司呈據本府長康等一十三圖里老楊景隆等呈稱同日辰時正一刻地震有聲如雷自西北往東南正二刻方止搖動合府官民房屋致將原分守禦本府大理衛前前右右二所城垣震倒一處約有三丈又據本府劔川州申據隂陽生張芳呈稱同日夘時二刻本州地震聲響如雷從坤方起至下四刻往艮方止將本州公廨分司牢獄牆垣盡行震倒并市鎮鄉村軍民房屋傾倒數多又自本日辰時三刻至二十八日已時二刻連震九次及據本州民人趙永老人李泰楊輝等各告稱前項月日本州西南方地震有聲如雷將人民房屋牆垣内多震倒壓死婦女楊氏等九名口并牛馬牲畜不計其數壓傷男婦段平李奴等共三十七名口即今時或微動不止人多露宿十分驚惶又據鶴慶軍民府經歴司呈稱據本府長康等里里老楊景隆等呈稱照得正徳六年十月二十七日辰時正初刻自西北往東南地震如雷響動至正二刻止已經備呈轉達外至本年十一月二十九日半夜子時正初刻地震自北往東搖震至正一刻止本府房屋俱各搖動等因各申呈到臣案照先據楚雄尋甸等府衛經歴司節呈前事俱經具題去後今據前因除㑹同鎮守雲南并金齒騰衝等處地方御用監太監張鎮守雲南總兵官征南將軍黔國公沐巡撫雲南等處地方都察院右副都御史顧案行通加修省外臣竊惟近來地震之報他省皆有之而不若雲南之數雲南之地先是固嘗震動而未有今此之甚葢四月楚雄震八月尋甸震今十月十一月鶴慶大理洱海劔川鄧川諸府州又相繼大震傾倒房垣壓死人畜變異極矣天戒切至㒺知所由將應止一方而於天下國家無所慮歟抑變且不測而非獨為邊隅咎也臣逺仗天威無敢逡巡顧畏時與一二憲臣及巡守官員巡行郡縣問民疾苦其有苛政敝法之妨吏民者固嘗具列上聞而暴官汙吏又嘗按治其罪顧荒裔之外多故之餘吏政尚和同士風習䛕佞權要所在上下靡然附之而勢利之移人雖平日譽望之士不能勉也今四境之内一嵗之中災沴相望癘疾大作民死亡相繼加之蠻夷跋扈不庭而饑饉遺黎復相聚為盜其為患至近且劇也而吾有司兵戎不修儲蓄無素諸凡所令所行非剥奪人之財則戕害人之生也然顧其安然為之而不憂譴責之加者此無他謂為夷而易虐逺人無得知也今變異之後必有奇應而有司曽莫之懲假設不幸而有方千里之水旱民且飢死何以備之又不幸而一夫首禍諸夷從之而起何以制之吾大不足恃者隣境貴州四川諸省寇亂相尋兵禍未解支吾捍禦之不暇卒有警急何以能相恤也臣切憂之夫一方之安危休戚係吏政而所以制吏政之平者巡撫都御史巡按監察御史之責何也風紀之攸存而羣有司之所宗也臣聞之都御史林俊之在江西力除姦暴境内肅清監察御史王憲之在直𨽻沮抑豪右民以安業故雖一朝之患不害也是惟二臣才足以有為而志不可以利奪故其名聲風采所至赫然非獨時使之然也今方急進取務容悦依違顧望不一可否事又言難委順以為衆人先謂為識時務知榮辱大不然也况又有不止於是者乎故近無所觀法而逺不知所嚴威吏以益縱民以益窮致此變異宜也臣才質黯弱復多疾病從事荒逺無所猷為慙負國恩大懼隕越禦災抗患實所未能伏望聖明俯念遐荒民窮財匱正宜保愛生全之時勑下都察院選差御史一員前來巡按仍勑吏部將臣放歸田里以便養疾申勑巡撫都御史顧令其正已格物播揚恩威使逺方之人有所持循依庇及勑布政使等官等令其守正奉公毋敢阿循附和利已妨民葢巡撫既得人巡按又得人布政使等官皆得其人則法制相維事體從正雖有横惡之人煩擾之令亦將禁而不得施而一朝灾害之來亦有所顧藉而消弭之矣奏㨗該雲南都布按三司右布政使等官丁養浩等呈各准本司咨闗抄奉鎮守雲南總兵官征南將軍黔國公沐等㑹案為急救生靈以安地方等事備行各職統率雲南左衛官軍同元江府建水州䝉自縣民兵由西路進曲靖越州二衛官軍同石屏新化二州嶍峨縣民兵由判村進雲南中衛官軍同阿迷羅雄寧州教化三部長官司民兵由齒村進㑹同進勦安南長官司叛賊那代那欽那銓那鉞那銘等依奉於正徳六年十月内俱到臨安府調集前項軍兵措置合用糧餉既戒且備於十一月十三日發臨安十九日進哨二十日擒賊三人攻打苴使寨擒一人二十二日㑹抵賊巢賊衆覘知先聲預於大小窩子等處據險拒戰我兵擒賊一人斬六人俘獲賊屬六口牌甲七件二十三日遂進攻小窩子寨那欽等率賊千餘人迎敵我兵冒險直前擊斬賊九人擒五人俘獲賊屬一十六人賍畜三十一頭件我兵亦被射傷二人賊敗遁去二十四日諜報賊那代等大衆據木雞寨進攻之復大戰賊潜蔽柵間伏弩射我軍傷民兵二十餘人我兵皆殊死戰斬賊八人俘獲賊屬并被擄男婦共一十五人賊崩潰投崖谷溺水死者甚衆㑹夜歛兵逼賊巢而營賊憚不敢襲二十五日復攻小窩子賊敗擒一人斬五人俘獲賊屬四人賊退保白石寨二十六日我軍集寨下分五路繞出賊前後賊數千人乗髙呐喊矢石交下我兵傷者二人死者一人衆力戰進薄賊巢賊急皆下馬迎敵我兵四面夾擊之又驅象放砲以助軍威良乆賊潰走斬七人擒一人俘獲那欽那銘妻妾四人牛馬盔甲共九十二口頭件副㑹夜我兵乃止二十七日我兵分道追擊遇賊於阿革山復戰獲那欽那代以衆遁去我軍追奔三十里及之復戰獲那代并擒六人斬一十三人俘獲賊屬二十七人賍畜二十二頭件賊千餘人走聚山頂我兵發勁弩巨銃四面攻圍賊又大潰多溺緑水河而死於是賊之精悍者死亡畧盡二十八日斬賊七人擒三人二十九日斬賊三人三十日又攻刼馬寨搜阿革箐擒劇賊者吾等二人俘獲賊屬三十二人賍畜一十四匹件餘賊散走復聚大窩子等寨十二月初一日攻破阿克谷寨遂進攻大窩子賊悉衆拒敵我兵擊敗之擒那代子那鑑等三人斬一十二人俘獲賊屬九人牛羊二十隻初二日攻斗木花仗賊敗走又搜臘窩箐獲那代妻一人并幼子那安女阿姐等七人賍畜七頭件擒賊一人斬三人初三日攻多歹寨擒賊五人斬一十人俘獲賊屬三人初四日於大屯山箐斬賊七人擒三人獲賊首那銓初五日擒賊一十四人斬二人初六日連攻果鵞白等五寨又搜濫泥設賖宰等箐共擒賊五人斬一十四人俘獲二十六人鎗刀銃甲九副件初七日又攻白舌普寧等寨搜娘都古箐擒那銘等三人斬一十七人俘獲賊屬一十九人器仗一十二件初八日至初十日又連攻雜宻阿母戈刻等寨搜曲宗箐共斬賊一十四人擒那欽子那成等八人十一日劇賊王七遁入箇舊山搜獲之又擒賊一人俘獲賊屬三人十二日又打戈刻寨追獲賊黨十人於是賊之父子兄弟與其惡黨渠魁擒獲盡絶其餘亡命之徒雖不能無然多脅從之人似亦可逭葢自十一月十九日進哨以至于今凡二十有七日通共拏獲賊首七名斬賊一百三十七人擒脅從賊徒七十三人俘獲賊屬牛馬騾羊盔甲鎗刀等項共三百八十六名口頭匹件副内被虜男婦二十一名口遂使大盜肅清邊方底定黎民安堵夷獠格心雖未躋不世之功頗收一時之效所謂兵不踰時役不再舉者也等因案查先據雲南布政司經歴司呈承奉使司劄付備臨安府䝉自縣申安南長官司土舍那代同男那欽那鉞那銓那鋭那銘并黨惡者吾王七等同惡相濟累犯不悛始賊㝠頑無知近而猖獗尤甚綂領賊兵前來城邊搖旗呐喊意欲攻城搶虜婦女割耳男子支解若待奏報至日方議征勦誠恐本賊自度惡逆既彰事勢已急一旦隂謀竊發或致攻陷縣治貽患邊方誠不可不夙為區處等因臣等㑹議得那代等屢肆猖狂益無畏忌節經撫諭曲為保全奈何本賊不感朝廷更生之恩益恃父子積年之惡其先殺虜禄卿人等猶是以夷攻夷今復戕殺縣民實已害及近地况將婦人割耳男子祭旗又敵殺應捕老人支解取膽日益兇殘罔知悔悟若不加兵勦捕誠恐日復一日滋其陸梁愈難撲滅職轉行該鎮守巡撫衙門查照原擬調發三路人馬行委右布政使丁養浩同都指揮同知方畧僉事邵遵道同都指揮方仲副使聶賢同都指揮僉事沐嶽各統率三路並進各要謀度周悉號令嚴明刻期㑹哨約日齊舉務將本賊父子人等擒拿解問仍行文安南國并附近賊巢衙門各於路嚴謹把截毋得助兵其合用糧餉亦依原擬臨安府廣濟等倉闗支設有不敷查支該府官錢糴買應用并隨軍賞功銀兩銀牌段帛等物通行布政司委官領銀前去措置仍聴右布政使丁養浩整理支給其有功人員職查照舊例就行各該守巡官員先行隨軍查驗仍候覈實及通行禁約征進官兵人等不許妄殺一人擅取一縷等因已經㑹本具題去後隨該職親詣軍前嚴督各哨紀驗功次禁革奸弊及鎮守雲南總兵官征南將軍黔國公沐等復分遣官員賫執欽降旗牌前去督功更㑹委分守臨元道左叅政鍾渤繼往齒村路與原定各官協謀行事及行兵備副使王昊繼督粮餉隨該右哨統兵僉事邵遵道都指揮同知方仲報稱攻打小窩子木雞寨白石山等寨生擒首惡那代那欽黨惡者吾續該中哨統兵右布政使丁養浩都指揮同知方畧報稱攻打曲宗等處山寨生擒那代子那銘黨惡王七又該左哨統兵副使聶賢都指揮僉事沐嶽報稱攻打擺寧大窩子等處山箐生擒那代子那鑑那安等及節據蒙自縣大屯小甲人等報稱賊首那銓并賊黨阿米等十人因被官軍殺敗逃來各屯山箐擒獲前來今據前因職㑹同鎮守雲南并金齒騰衝等處地方御用監太監張鎮守雲南總兵官征南將軍黔國公沐巡撫雲南等處地方都察院右副都御史顧議得三司統兵等官從事兵戎躬效智勇以故軍士爭奮醜類悉擒方當匝月之期遂定積年之患尤能戢兵戒殺不忍大索窮追允安夷漢之心大洩神人之憤諸酋絶其邪志外國息其釁端是皆仰仗天威遂爾靖安邊境也其三哨官兵斬獲首級生擒賊犯職已親臨紀録杳驗復審追出安南長官司印信一顆同將解到獲得牛馬騾羊變賣銀兩并盔甲鎗刀器械逐一見數俱發布政司收貯俘獲人口發屬收養被虜男婦給親完聚首惡那代等發行三司掌印并該道守巡等官從公㑹問至日與有功陣傷等項官軍民共姓名覈實造冊及本長官司衙門印信各另奏請定奪用過糧餉并賞功銀兩等項行布政司清查造册徑自奏繳除於十二月十五日班師外縁係捷音事理未敢擅便㑹專差齎捧謹具奏聞伏候勑㫖守保定有疾乞休臣由進士初任知縣尋陞御史及補今官先於正徳二年四月間該吏部為急缺科道官員事題奉欽依將臣行取赴京彼因限期𦂳切衝冒炎暑兼程前趨行及山東徳州地方中途風雨交作猝乏雨具旁無旅舍前有嚴程比至州城自辰達酉霑濕既無可避饑渴復不能支臣氣體素弱加以濕熱交蒸道路勞頓遂爾困憊行不能前淹留信宿隨復就道臣於爾時亦不覺受病之深也自後每遇春夏之月煖氣流動前疾舉發痰飲客於中焦濕氣流於支節拘攣煩亂不時有之年復一年漸以沉痼今春以來疾復大作脾土内蝕心火上炎飲食言語動有妨礙較之初年實益狼狽臣前在京師乞藥於太醫院醫士盛曄韓春項尚陵及往雲南則醫生孟淳梁景芳至保定則醫生霍鳯相繼診療迄不能痊藥餌徒施病根終在臣初有疾遂欲乞身歸田思惟國恩未報初志未終猶欲勉圖後効既而行役逺方歴觀多事感激發憤不忘于衷此臣所以强疾馳驅依依以至於斯也今病與日増莫能自力數月之内疾痛飲藥之日多安强從事之日少臣之初志實所難醻况臣始以中途被雨蒙一朝不測之患因循隠忍遂有今日腹心肢體受病彌深而旅食異鄉上無慈母之顧憐下無妻孥之在側生死之寄委於僮奴則微臣之身將來之患其不可測度有大於今者也臣嘗驗之往時疾作療之易愈近而微一感觸調理尤艱葢元氣不逮於平時藥力不至於膏肓而疇昔諸醫復多間逺興居之際少逸多勞此疾所以日益危也臣聞懷榮保安非事君之道勞形役神非養命之理今臨政則疾未閒療疾則政不裕勢不能以兩利患常失於後圖為臣之謀義先謝事固不宜忘諱疾之戒而䝉竊位之憂也况夫官為牧守屬當大郡假專制於一方並等威於三輔雖多才强力之人猶懼弗勝其任如臣鄙病何以能堪方今國家經多故之餘適更化之始用賢養民急於療疾使臣於此茍禄以養病軀冒患以榮名嗜進而不知後悔則國家將焉用於臣而臣之危病實妨賢人之路此臣今日迫切不得已之情也臣前在雲南亦嘗冒死陳情願乞休退未蒙諭允臣當殞身盡瘁仰荅深恩然疾乆不瘳職益多曠居常省念彌切驚憂素餐之誅臣奚能逭伏望皇上憫臣病苦察臣愚誠勑下吏部將臣放歸休致以便調理萬一茍全多病之軀獲觀太平之盛以大國家生成之仁則臣不勝幸甚縁係有疾乞恩休致事理謹具本令男張貴抱賫奏聞伏候勑㫖再乞休疏臣因舊患痰濕調治不痊謹於今年三月間具奏乞恩休致仰奉欽依吏部知道欽此欽遵續䝉該部轉行撫按衙門行令臣在任調理照舊供職遵依一面服藥扶疾管事至七月初旬前疾大作肢體重困莫能支吾已將所掌印信及倉庫錢粮等項闗發本府委官署管外臣思惟數年之疾非一朝可瘳乆疲之民非卧而可治雖臣仰荷深恩罔敢自惜然數月以來身心雖勤於簿書日力每分於醫藥沉疴積滯轉相為劇豈惟微臣懷鰥曠之憂而郡民猶觖保全之望無寧以臣一人而重為百姓之菑也伏望聖恩俯垂矜念勑下吏部容臣退休速選忠良代臣職任庶幾臣病軀得以歸全郡民有所庇賴臣不勝感戴天恩之至縁係多病曠官懇乞休致事理謹具本令男張爵抱賫奏聞伏候勑㫖副汴臬乞恩休致臣見年五十六嵗直𨽻揚州府泰興縣人由進士先任知縣尋陞御史於正徳七年陞直𨽻保定府知府正徳八年因患痰濕等疾奏准致仕節該兵部侍郎陳玉監察御史徐文華盧雍及臣原籍直𨽻巡撫都御史叢蘭巡按監察御史張士隆各保舉題奉欽依起用正徳十三年五月内奉吏部劄付文憑復除福建邵武府知府臣時舊疾痊疴依奉於當年九月赴任至正徳十五年十一月欽陞前職正徳十六年四月前來到任臣仰思累朝録用之恩適逢聖政維新之㑹召起老成任用賢知雖林壑退藏之人亦思奮揚以効尺寸况臣謬膺風紀之任濫被金紫之榮敢不勉竭庸愚少圖報稱以無忘疇昔諸臣論薦之言然臣矢心未終行年則晩形勞疾作葢不自由去年冬間風熱上壅右目猝然昏花今年春來痰濕旁流左臂旋亦痿弱近而目益加暗臂復不仁淹留彌時醫藥罔效案牘妨於披閲出入艱於應酬司法之官豈宜有此懷榮保禄臣不忍為竊念臣少時疾弱至長差强甫過中年老態隨見且臣自先世以來類多蚤世臣祖琳卒時年纔五十有二叔祖中書舍人城卒時年纔四十有六臣父贈監察御史黼叔授迪功郎黻皆以五十六嵗而歿去年臣弟翡亦以五十二嵗而亡臣今年五十有六視二祖及弟已踰其數視父與叔適如其期雖修短有常然父子祖孫相承一氣顧臣髮短齒疎疾多食少先零之質不能無望秋之感臣慚負國恩無所逃罪顧臣有二弟皆由進士出身翀任江西廣信府知府􅙆任禮部精膳司主事彼皆年力精强志尚堅定臣固常遺書戒之彼其在職宜可以仰答洪恩於萬一是臣報國之心雖不能行之臣身猶或行之臣弟也此臣衷曲之言何敢上塵天聴念惟君之於臣猶父之於子子有疾苦必從父母告之今臣不幸而有宿疾隠憂敢復隠於陛下伏望聖慈憫臣衰疾察臣愚誠俯賜寛仁容臣休致萬一仰仗威靈猶幸茍延喘息臣雖無狀猶將拭目瞻天以觀太平之盛舉手加額以祝齊天之休臣干冒天威無任戰慄隕越之至縁係有疾陳情乞恩休致事理謹具本令男張熈抱賫奏聞伏候勑㫖河南左轄乞休臣由進士歴任知縣御史知府按察司副使於嘉靖二年四月内陞任河南右叅政南陽撫民爾時因患目昏臂痿等疾上疏乞恩休致䝉吏部題奉欽依病痊推用自是獲歸田里屛居一室專意養痾六七年間目始暗而復明臂先痿而亦瘉視瞻作用盡復故常出入興居一無妨礙嘉靖八年二月内叨䝉復除四川左叅政無幾陞河南右布政使尋轉今官仰荷隆恩亟於圖報不遑顧慮銳意前來比至藩司衆務攸萃乆静之後輙不任勞數月以來兩目昏花幾不能視一臂麻木幾不能持披閱多艱應酬俱困兼之行年既邁老態寖加當事善忘與物多忤每譸張於胥吏恒紛糺於簿書嵗寒之節雖堅日暮之光不與老馬無庸於捕䑕樗材焉取於蔽牛臣誠自知謂宜速去若復留滯寧無悔尤咎至圖歸為謀斯晩况今境内多故民間阻饑上自撫巡衙門兩司長貳下至州縣卑官罔不事事而臣屬以衰病冒守藩垣瘝曠為嫌譴責奚逭縱人言之未及亦内省之未安臣慚負國恩莫能報效忠誠不泯雖死猶生未終填海之心能忘結草之念伏望聖慈憫臣衰病勑下吏部容臣退休庶幾少延六袠之餘齡卒全三紀之終譽臣不勝感戴天恩之至再乞休疏臣因患目昏臂痿等疾於今年正月二十四日上疏乞休未䝉賜允臣不勝感懼謹復昧死上言臣昔自諸生叨登進士服官中外三紀于兹爰自草茅薦歴藩屏猥以韋布濫被金緋顯榮逮於尊親温飽適於俯仰一身之外悉為國恩萬死為期敢忘臣節顧行年既暮初志未終臣本庸愚老益闇劣才不足以通變智不能以自謀而末疾彌留患在要害奉職無狀中切憂危仰惟聖明本以亷退取臣臣敢不以名節自愛茍昧乞身之義終懷失已之嫌亦非所以報効於明時也伏望聖慈憫臣衰疾勑下吏部容臣歸休則陛下天地之仁始念臣愚既拔於幽滯終憐臣老復鑒其悃誠愚臣進退之間實惟吾君所命臣無任待罪隕越之至雜著奉巡按察院議兵事狀伏承誨諭義概凛凛豈惟武弁下吏有所感激震動雖鄙劣若羽者資益固亦非淺耳夫英雄豪傑平時韜晦其於天下之事若非素計預習而一旦荷重寄攬大權綱維萬里之外而拊循羣僚之上則其經營謀畫皆出於尋常知慮之外而事變之來雖至於驚世駭俗聞見亦裕然為之而無所難此果何術以行之哉道誼閑諸中而事幾激於外也昔孔明起南陽出壠畝耕耘之姿任興漢討賊之計以與天下謀勇之士鬭智角力於一朝雖平日奸雄跋扈若曹操司馬懿之徒皆摧敗困服而莫敢攖其鋒議者謂其為伊尹吕望之儔管仲樂毅弗論也陸贄在奉天圍城中以疏逺危譖之階專懲艾悔惕之令致能使山東之士感激不忍忘唐先輩謂其文術出張良賈誼之右葢惟二公者其心明於義利之辨其智審於順逆之勢而其才又足以通於應變之務也今執事釋褐入仕冠豸立朝搏擊以為權澄清以為任控海濵險阻之地犯事勢危迫之秋義有所不辭幾有所難遏雖微軍旅之命而得以任廓清之功雖無綸綍之責而得以宣仁義之言執事其將亦為武侯宣公之烈也乎此東南之所屬望而愚夙夜腐心焉於斯者也所論備戰守給餽餉及諸條約謹已悉如指揮處分畧定唯是意外之慮亦已領畧罔敢忽忘獨計邵武為郡宻邇賊巢賊若一意東下此非所為圖若欲竊據以延喘息或崩潰亡命則侵軼奔逸足為吾憂然建寧有周知縣必復雖慮其獨任教諭周瑾可輔之光澤杉闗近有徐知縣泰今武平監司復遣沙縣何亦尹知縣以往其他闗隘亦分布將吏令各自為守是二要害地皆得人料理必能辦此不憂也若泰寧邵武諸隘亦遣吏䕶之聞其地距彼尚逺山嵠峻仄一夫當闗其險足恃顧此不可往彼豈獨可得來耶抑此時此地要為不可攻以待敵已飭境上吏修堅壁清野之法嚴偷號斫營之警凡既備矣至於成敗利鈍惟天所授人臣之義竭力致死與城存亡外此無復有他謀矣第先後諜報為説不倫淺陋之見直以為皆謬耳英雄欺人焉可盡信故聞命之日不此之為憂而憂在彼顧賊非英雄耳聞之蓄念既乆其所延攬招致非一日矣曽不得一中材之士為之規畫而孟浪狂悖至如斯者此其間或有狙詐之術設疑以誤人耳竊謂爾時生日稱賀必其人已亡去失所在故孫公輩從而索之索之不得明日復往又從而索之其舍人賔客隂相為謀亦懼人之疑而圖其後也遂錮諸公不出戕孫公以懾諸不附逆者至於奪印符收府庫亦一時急計茍圖自免以利行事此其為謀既乆且秘非至於今始殺人而反也又謂京師已戮二人謂孫公告其反謀章凡十三上通政司業已封入此二人並以授之賊且於上前明其無罪今反形已露遂先伏誅審如是當復何憂竊以為未然夫二人者皆有擁衛之權平日怙恩妄作固當無所不忍然小人之情秪圖其利顧今已極富貴欲復何為彼其為志將亦不利其有他也渠獨不聞丁公之事乎矧章疏實非其所司彼烏得而盜之此其間倚伏之幾又有所不能言者此愚之所大懼也諜者復謂賊悉以其衆登舟順流而下果若人言其將安之耶賊誠愚無謀亦知乗城之利乗舟之害使非謀定計成徒謂其王室懿親人不敢輙圖已一旦舍城郭就舟楫欲以千艘之衆臨不測之淵與天下爭衡以徼一時之利則南都沿江諸軍扼其前荆湖襄漢上游諸軍躡其後進不得以戰退不得以走勝負之數此成禽耳安有身為大賊而猶謂人不敢輙圖之者哉誠然是天亡之而彼自送死也凡此類可疑志士仁人當必有旁觀黙㑹流涕痛哭搏膺扼腕欲言而無從者矣羽七年家居不省門外之事而逺地無可與語者故私見臆説誕妄無所取衷而於執事為役之日淺料敵之計疎懼見譴誚顧耿耿有懷不敢以告人亦不敢不以告之執事也是間城守凡有數説未可先圖亦以夫人為心不同雖面語終日不得其所為謀也已復使人偵之俟得報遂當馳請承命約畧上瀆衛士驕縱而為之上者乏帥正統馭之人上下之分不明親長之義不立平時不可倚賴緩急殊易於動搖武弁數人志相報復攻擊效尤此其勢不至於胥敗不止耳設有警急方憂其内崩將何以戰亦何以守今計郡城週遭為地七里週城之堞凡為數二千三百有奇官軍之衆不及是一旦欲為持乆計必參用民間丁壯計三人守一堞法當用七千人官軍僅二千二百餘人猶當用民丁四千七百人然其父行子從兄行弟從子弟行者父兄亦從之其衆實倍焉賊至則分畨迭戰賊退則更休以守此所謂全軀保妻子之人終必得其死力而潜消衛士陸梁之氣亦賴有是耳先是徧諭郡民之家凡為父子兄弟者幾人令人具一器杖平時操為以備他盜今適嚴警悉以齊一時或召其父老感以忠義諭以恩威使自相告語緩則作業如故急則授兵登陴上以衛公家下亦所以自衛庶幾訓習既乆可以一戰耳議者持論欲復衛士前日汰去之餘然此為數無幾愚見其害不見其利也急則用之緩則棄之非所以示大信也且令此曹輕有司矣不得已而以分𨽻他隘易民兵代守者而就其餉亦一術也其城上週廬凡千三百所畧如省城之制此在承平足為觀美設有城下之師亦賴以蔽風雨拒矢石然吾之勁弩長㦸亦不可得施而火攻之患尤可憂也謂宜乗時改移去其十之一脩火道復戰地斯可以言守抑師行糧從今議守備糧復不可緩計有司嵗積秪足以供衛士三月之需其民兵咸有顧役之入不復食於官獨所云拳師打手則皆市井屠沽之流田野䥳鋤之氓一旦奪其衣食之業使之擐甲執兵以臨不測之地此不飽其食何得以用其力哉顧今府藏無畜財以為糴本則數千石之粟卒不易得不得已而出其下䇿顧屬邑類有積粟以備嵗㐫比來年糓屢登民未仰食固可一取之以供軍實不宜委之以資敵也若粟又不足則索諸郡帑量出金貲令其豫畜以應時需選任亷吏以司出納俟賊既滅徐為之圖此一時之權非萬全之䇿然較之有司取諸民間以生咨怨利害正相十百千萬也大率此物一歸之官自無常主急則為軍師之費緩則為府庫之藏亦勢有必至而理有固然者矣均為國家何所殊異顧任人之道尤難其選當更圖之事在獲已即不宜以為請也然此皆為守城計而未及進攻之議惟髙明長慮逺攬定戰守之計權輕重之宜審利害之勢號令之下其誰不致死諜報屢至咸謂賊果東矣為今日計悉索列郡精兵以號召江閩豪傑分兵守要害而以一軍䕶糧道約南贑兩廣建昌諸路赴義之師刻期西下先以一檄散其協從黨與繼遣精鋭由間道直搗洪都據賊巢穴而以諸軍循江而下且戰且招賊若失利於東勢將復西而我背城為戰以逸制勞則主客之勢成而掎角之功立矣此䇿之上者也特懼吾財賦不足耳財賦雖不足而役不可已若不及早圖之俟其竊據已成而以全師臨我制之之力其難當十倍於今而猶未見其定也夫緘縢扃鐍之施非可以備負匱擔嚢之盜所謂小堅大擒者也故兵法貴於通變而智者利於攻瑕謂勢有所宜趨舍也今吾不忘西向之憂而賊適不虞於我也不因利乗便以撓其計至環數州之地連數萬之衆殫財屈力為巨盜守非用兵之法也愚聞善勝者必先進戰而後可以議退保若先為退保計後將有欲戰而不能者矣先發制人惟髙明圖之百年之謀千古之憤決於此矣敢私布之左右病暑不能為辭且指彊不能執筆伏惟執事矜原焉悚悸悚悸擬河南鄉試録前序國家統一區宇任土之貢實維萬邦然則貢舉賢才以資盛治固當以天下為選也嘉靖元年河南鄉貢大比得士凡八十人葢制額也視兩都則為少視諸省則為衆亦選於千七百人之中而拔其尤者也噫兩河昔稱形勝為之士者亦雄於文哉或謂文章之體至科舉而寖壞為其沿襲常格不足以盡士子之長然就其所至亦有不可廢者葢學非醇則無以適理辭非飾則無以行逺其一時掄選簡拔宏深辯博之學髙明碩大之才胥此乎兆焉要未可以記誦辭章少之也愚嘗博觀程式之文矣數舉以前猶尚古簡後稍變而為華藻乆之充放豪宕視前大殊至於今已為極盛意者更歴數舉之後日新月異超軋抵轢于今者亦將猶今之視昔矣葢文章必屢變而益盛自昔已然非由今日也然昔之文其變也以時今之文其變也以地三代而下文章之盛莫若兩漢西京之作渾雄醇厚介於先秦戰國之間最為近古東都以降稍稍不逮而魏晉又次之唐以大厯貞元為盛宋之作者亦大振於熙寧元豐之間此所謂參氣化闗盛衰而非偶然者也今之諸省固古者列國之分地京師南圻文章都㑹故能備四方之體外之業文者呉楚長於富麗甌越長於清雅齊魯長於藴藉巴蜀長於組繪三秦習雄渾而三晉尚豪華葢皆得於山川風氣之所先與夫師儒習尚之所守雖其體裁思致不能皆同要之類足以當一時之求而不失為善變者也愚初入大梁道嵩嶽之麓問黄河之津見其穹窿汹湧卒然逢吾前而駭吾目竊謂地靈如此發為人文宜當何如今諸士之文始見其平暢豐衍無險陂若廣原然冲澹瑩徹無混淆若止水然至其神奇特出汪洋大肆理至詞順而氣益充真若仰峻極萬仞之勢縱奔流九曲之觀恍然心境相忘而莫能自喻于言語形容之外信諸士之雄於文也雖然愚聞之非其地而樹之患不闕擬河南鄉試録後序文不可易而為也亦不可易而知也盡其心以為之迹其故以求之欲因此而得彼亦難矣夫四民之業惟士為大農工商賈咸專一業以資其身茍為泛用其心則業不得而精業不得而精則身無以為資故農不知為市而賈不知為鍜專於業故也士則不然凡天下之事皆若切於吾之所為有所不知則必窮搜逺討以求得其説積之乆而後出之則言有所資而叩之其應為無窮故積文之士身不親耒耜而説稼辯於老農手不操斤削而審器智於巧匠足不履闤闠而課利悉於良賈豈惟是也天下之事皆能知之皆能言之彼研其精於汗漫之中而凝其神於紬繹之節則其為業者精而為文者工矣夫豈茍然哉然凡業習於身則專而固習於言則泛而疎固則可以乆而疎則難為終文者士之所業也以言習之者也言固有時而渝者矣抑孰知士以文而著文以實而顯世未有不立事功而可以文章稱者故太上以立言為功徳之次况空言無實者哉今夫農不以多穫舍其耒耜工不以絶藝毁其斤削賈不以善售越其闤闠以是為恒業而固守之也士於文何獨不然有所資則攻之至於事功之實乃或外視之而漠然不以加之意曽彼三民者之不如遂使天下後世謂文士為多言無實吁亦戚矣故夫求士於文華之中鮮有能不眩於將來者而聴言觀行雖聖人不能廢也知言顧豈易哉昔之人惟賈誼董仲舒韓愈陸贄韓琦范仲淹之徒為能文其言至於今不朽彼所謂踐言力行之士也外是則揚雄善草𤣥而守道不如杜欽谷永張説擅文宗而許國媿於姚崇王安石盡讀天下書而相業不逮司馬光逺甚則亦何有於文哉今諸士子之文組麗而非華宏博而非誇渾乎無涯浩乎成家其於業可謂精也已矣自今以往其將力行其言如賈生輩之不朽矣乎否則亦如揚雄之流而已矣是非有司之明所能逆覩也夫農荒於耕則田畯制其罰工怠於作則工正考其事賈忘於肆則市吏索其藏今士登進於有司行將有官守言責之寄茍為不恒其心而棄其業其視事功之實不若今之於文也則有司者固得以操權衡黜陟之説以臨之也河南鄉試得士八十人葢制額也有司惟視其能文而已諸士子其知所以自致者哉茅公祠記分有至近而逺事有至易而難夫君親近倫也依以始終故逺忠孝易能也視以生死故難是故名掩於常而彰於變行隨於安而激於危家不造則子道成國多難則臣節顯理所不可奪勢固不能違然則委質之素移孝之終至於靡身殉國不亦難哉吾鄉先正前副都御史茅公當洪武之季遇難以死至於今其英風義烈凛凛猶生鄉人故老類能述其概葢當其時有身見其慷慨赴義者言之心懾氣奪謂公忠節古今天下所未有吾敝邑藉以有稱於時公是之死顧不為難耶抑公非獨殞厥軀爾矣其子死焉孫死焉至其伉儷亦死焉葢航海之行未成而赤族之難隨作雖室家之近有不及相謀者而為忠為孝為義舉無歉焉則誠難矣昔我文皇帝以神武首出之資建萬世太平之業一時遭逢侯王滿前勲勩相望乃獨有如公者矢心召忽抗節豫讓真足以媿夫為人臣而懷二心者亦豈不為聖化之一助哉若茅氏者誠不可少矣孰能為之葢自元之季世海岳氣分人倫道喪否痼極矣國家隆興之始其英華精爽發於羣倫為賢為哲為俊為傑為志節為功烈挺異雄豪之輩往往有焉公固一代偉人平時脩為論議必先其逺且難者而從事焉卒之能使其家之人感化興行咸知倫理之大綱卒遇變故欣然同歸夫豈待於驅使然哉故尚論之士謂公一門全節當其氣化所至足以當隆古多賢之期㑹不其然乎惜乎公道誼類董江都經畧加賈長沙而前席之召臨軒之問漫無所遭直使之不幸而涉大變蹈至危進不得覬伊周之勛退不得託夷齊之迹悲夫或者謂士之處世銘功彛常與喪元溝壑初非二致不為此則為彼吉凶成敗惟天授之其信然哉若公之死非一人一家之故其所闗係至大矣公諱譜字大方希董其别號世家泰興初舉賢良方正仕為邑學訓𨗳尋遷秦邸長史擢副御史臺素善前學士遜志方公嘗為公作希董堂記意氣相許卒與偕死國事可謂同趨於正者矣公殁垂百三十年典刑不可識文獻無可徵後之人為之悲嘆感慨葢有不在中郎博陸之下者豈不痛哉前提學御史蕭公責邑令彭侯即廢祠祀公後巡撫都御史劉公復放遜志齋故事謂吾令朱侯為刻希董集以傳亦仰承國家崇尚忠烈之盛節也既而朱侯以廢祠非所以奉寧公九原之靈爰考公故宅於市橋迤南屋廬堂寢咸在乃仍其舊而修飾之遷主其間致嚴祀事冀公有所依焉謂羽為公鄉人託為記其事羽老且病顧奚能言然表章先公遺烈固夙夜腐心焉者亦奚以為辭爰志其畧朱侯諱箎字守諧紹興山隂人世以儒顯兄弟登甲科者三人伯兄侍御公暨仲兄武庫公並有風節侯蒞政修整邑中稱宜朱氏葢忠孝家也故侯於公尤加之意云送河南按察使陳公遷山東左布政使序𢎞治丙辰同年舉進士者凡三百人時在京師相與游從甚洽今距昔垂三十年一時同升東西南北若萍梗然聚合不可得常而江湖萬里之外一或見其文章聞其風采則必傾慕感慨而遐想其為人庶幾乎見之而無從也噫是豈獨愚於諸公然哉其不能忘情於三百人猶一人也河南按察使遷山東左布政使静齋陳公愚丙辰同年也公自舉進士至為方伯敭歴既乆其操履貞固器度優宏固無假賛述愚嘗得其所著西行稿南巡録諸書而竊觀其文章其纂述則義例精純其章疏則言議剴切其詩歌諷詠則興寄冲淡而曠夷要之其言出於其衷雖不知其人固可以想像得之况於知公者哉然則公譽望日隆而駸駸顯庸者非獨以治行優異受知於時而已也愚近承乏汴南獲與公周旋者數月公為政整暇日斷獄至百數發姦摘伏如神明然雖豪右權貴一無所假借然平反亭疑之功為多葢刻深文致非公所為心而勸懲寄於刑罰之外要之非文法吏所能辦也至凡河嶽祭告之文金石記載之作多出於公公之為學為仕可謂勤而有成勞而有功者矣抑公初入翰林為庶吉士得盡讀中秘書而出督楚晉諸州學事復以文字為職業調郎秋官提刑外臺皆明刑弼教以為守故今迄有底績信非偶然耳公嘗語人謂如錢穀出納兵賦庸調稍若謙遜而不居者至當事者或有所咨焉則酬答如響悉能當其義而服其心又可見公於天下之務罔有不究心焉者其勤且勞非一朝矣今往之藩東豈惟旬宣經制是賴台輔之任兹姑試焉愚聞之鄒魯尚文學而青齊之間詐力相高以成風徯公之至也乆矣公出其平生緒餘以淑諸人而移其俗使東方之人衣被威徳若南河之人而加盛焉尤愚同年者之所願望也公行有期同僚董公抑之王公彦聲謂愚於公有宿好以贈言屬之愚顧愚疎昧謭劣何足以知公而沉迷簿書思致冗俗其如公之行何哉計惟贈别之艱於辭愈於惜别之艱於感遂以斯言復二公而致侈望於公焉公將何以命愚耶送邑博宼君歸鄜坊序嘉靖改元之明年余歸自汴藩適吾弟廣信太守亦解官來歸相與角巾野服徜徉於東田北渚之間與平時交親能詩如某諳樂如某某善圍碁某工鼔瑟往往過從忘形忘年以共樂余乃為吾弟書春帖云才地慚良牧恩波放老漁又自署云廊廟重熙日江湖後樂年葢先是三十年僕僕修途淄塵湼衣頽波委楫馳隙之景迅邁不可復追自兹以往為嵗月者將復幾何幸而息機弭節庶幾少延日暮之光以觀太平之盛其幾葢在我而不在人也抑士之仕於時也固為道焉耳夫茍大而不為天下之具瞻小而不為一方之倚重可去也抑或上焉不為父母之養下焉不為富貴之謀可去也故巢由棲於唐虞不失為通沮溺囂囂於春秋不失為矯道不同故也然則今雖彚征類進之時而山林長往之迹顧亦焉可無也鄜坊寇居典教吾庠也七年矣其人古貌其為心如之居常有恩於諸生故士類感之間亦有惠於吾民故邑人懷之然以其狷介少容矜持太過其畏而銜之者亦衆矣今年春君謂其乆事於外也毅然請老以歸諸士民留之再至不聴乃相率祖餞於西郊酒行樂張迭起為夀于時周生崇儒進曰吾師端人也有範俗之度為之賦羔羊繼而蔡生劵進曰吾師隠倫也有髙世之風為之賦考槃於是宼君乃作而言曰夫行彰於人者美之孚也樂成於已者善之充也吾無能焉二三子辱貺于我逝將奚酬賦木𤓰而退明日崇儒劵以語余自余歸食於家與余同者獨吾弟及吾友閩郡别駕陳君二人顧今復得宼君焉君之言曰吾非薄仕進而樂亷退也吾行年近暮而病且貧與其行或聴於人而志不伸於已雖日被三接之寵嵗荐九遷之榮吾烏能以彼而易此也君行矣其鄉之舊遊亦必有奕者絃者唫者謳者徯君之歸乆矣君至而恭桑梓撫室廬之暇將攜若人者覽玉仙之勝弔石堂之迹倦則升堂抗席命杯酒叙平生之歡於是乎張陶朱圖誦淵明辭出余今日之言證之庶幾君之為樂亦猶夫余也余雅重寇公於兩生有𤓰葛之誼因其請故為之詞送行詩凡若干首題其簡端為景湖别語葢慕寇君若蘇湖之胡公云賀邑大夫朱公冠子以良序壬辰冬十二月既望吾大夫思齋朱公以其仲子以良仲貞者冠於邑學之明倫堂先期宿三舘師儒五經弟子暨吾儕歸老于鄉者咸往焉至是大夫迎賔而入揖讓以升相禮有人將事有容三加彌䖍祝辭惟令既乃張筵醴賔觴諸執事者酬酢有秩雍容怡愉禮成而歸於凡與於斯㑹及士民來觀者咸謂大夫能行古禮而嘆慕之諸生周崇儒焦烺以東田子羽承大夫賔召之辱諗曰大夫重冠事不得行之於廟顧令之室奚擇於學之宫而必於斯者是有謂矣羽續其言曰大夫於民若嚴君焉富而教之職在大夫令其子視吾人家視吾邑故教民始其子教邑始其家重始於學示民益周矣且大夫為理之日淺賦均而訟平政通而俗成退而勞心出而勞形凡所以徼惠吾民者至足矣聞之前大夫之賢者若江夏蔡公古燕呉公蓬溪羅公順徳洗公永豐鄭公徳惠在人心至于今思之大夫兹嫓美數公而威明整暇文采風流過之吾民頼以安養化𨗳之者將超駕前脩而逸其羣奚但一禮之教成而已抑大夫名家父子昆弟甲科相望焜燿後先有子四人伯曰某字某偕其仲業儒大有文名叔某季某雖少而岐嶷穎異稱其家兒則吾以良之冠成人之禮大夫素命之乆矣兩生者以吾言為足以徵大夫之後請書以頌之因序三叔母夫人夀文予季父從母何夫人以恭仁康定景皇帝臨御之五年逮今上皇帝嘉靖十有二年生八十年矣子家故事内外大人夀登六十若七十生日舉賀輙異常年夀八十者葢尤異也近世以來惟予仲父從母戴夫人八十有五顔貌僅若中年今夫人復繼之秋八月念有七日適初度辰諸弟羾習宿從問禮厥明羽以羣從九人者入候寢門外夫人亦夙興具禮服以出見於中堂稱觴致詞已乃行禮為拜興者凡八既而孫之行十餘人曽孫之行復十餘人姑之子及子若孫之壻外孫若女孫之子至數十人咸以序見率如初禮仕而不與是㑹者獨夫人之伯子詡及予仲弟􅙆二人耳此外而丈夫則然内而諸子婦諸孫婦暨諸女孫歸寧者亦三言勝常則效脯羞致潘沐飾帔帨獻縷繡須次展拜視丈夫倍其節焉其不與者亦詡􅙆二婦耳夫人乃人賜之食飲既徹則應門入致客詞曰某無似幸托鄉里衣冠之後辱於慶門有連禮得以拜夫人敢首以請再至者曰某某之父若子獲從諸郎為兄弟交夫人固吾母某固夫人子也幸無辭見焉三至者則曰某東家之西某西家之東某隣某也嘗及見夫人願入為夀凡是三等為客復若干人夫人皆命辭之弗獲則皆見之客則李澄之朱廷潤劉尚絅呉天瑞余徳英常時享諸君也是日内外見者葢衆甚夫人問勞酬謝咸宜其人葢不徒於諸子姓頷之而已夫人名家少有淑徳夙閑姆儀晩娯孝養視聴聰明興居不衰猶二十年昔夫人也是舉親賔餽遺羔鴈醴幣筐篚殽核填委㕔事飲客無間疎戚少長閧然騰懽雖輿臺臧獲咸使醉飽匪羾習亦不能辦也夫人以盛事命羽為紀之憶為兒時以至壯嵗逮事諸父諸母周旋詩書禮義間餘六十年今老矣事二母惟日之戀明發之懷逝將終身慈命有嚴忻戚係焉因叙以志五叔母夫人夀文予叔母飛熊公朱夫人今年夀八十仲冬念有三日是為誕辰族氏於夫人若小郎輩從子輩孫輩妯娌若女婦輩長少咸集序拜者四致祝者三亭午始寅絡繹未巳人衆故也親賔則有杭江津亂淮流沿危㴑險晨興宵征不逺數百里而至者里閈之近可知已于時有以文事為夀者擬遐齡於金石咸出鉅筆有以繪事為夀者放至樂於仙真悉為良工而絲竹沸騰則猶機杼之伊軋醴牢稠疊則猶廪庾之充盈於是夫人之子從弟欽錦樂母之夀悦賔之來既稱觴已則張筵於庭揖衆於座坐而南向者皆華顛素領金緋在躬葢非有齒爵者不得與也次則儒冠衣者年少長者坐以北向東西向者惟序戚序長而已三爵之後獻酬交錯歌舞迭興殽馨酒芳人其醉止輿老掖少歸近舍逺葢日不足而燭以繼之明日復然又明日復然三日乃已一時儀文之盛豈惟鄉人雖吾家未始有也始飛熊公以縫掖之𦙍謹厚稱於吾宗素善治生積金鉅萬而敦睦好義人咸徳之卒之以貲偕欽補官飛熊指揮錦及孫梓並登國學椷授散秩樞臬並佳葢公五十年間承遺安振餘烈躬被金紫施及後昆可謂盛矣夫人名家純徳猶諸母而慈惠逮下室家攸宜今而八十康强優游老景志安體和顔色怡悦計雖九旬猶今雖百齡猶今而後之來日當未可涯也先是三日欽復得丈夫子一人夫人喜動顔色而諸母宴集垂九十者二人夫人同甲者二人怡愉滿堂樂可知已亦惟吾家有之夫來而不可期者申錫之祥也有而不可奪者迓承之善也向使陶朱猗頓之資王母元君之適茍無主張綱維之者則皆徒然覬幸之矣羽世承先公之義報徳之懷猶之公子因以兹言入夀夫人夫人亦首肯之欽出以語其客黄君玉封君銅呉甥鵠輩僉曰惟義昌業惟徳紹休先公夫人誠有之請書之為稱觴之頌亡弟文舉墓誌銘嘉靖癸未冬十二月甲寅葬我先弟文舉於馬庄之原先考侍御史定興府君先妣太孺人墓次其兄河南叅政羽廣信知府翀同時解官咸歸于家相與聚哭既哀既痛乃謀諸弟翑圖志其墓惟先君葬時大司空嚴陵胡公實志之及葬先妣又得大司馬太原喬公為志吾張氏世系之詳昭然可質兹得以畧吾弟諱翡文舉其字常於别業構石為亭號石亭居士先君生予兄弟七人羽為長翀次之其次吾弟弟之次翹官衢州府學訓𨗳次翊不幸早世次􅙆官禮部主客員外郎季即翑明經補邑庠弟子員累舉未第皆太孺人出也吾弟生成化庚寅十一月四日卒正徳辛巳十一月十六日行年五十有二偶病鯁誤於醫遂致不可諱嗚呼痛哉予何忍言吾弟豐偉卓犖器度𢎞逺幼而敏悟讀書為文諸兄莫能先長工於詩為句清雅石亭稿存焉為有家法其初在先君侍下行誼無所見先君即世弟綜理家政䂓則甚詳内外經費出入惟義予兄弟二十年得無内顧憂以專心宦業賴吾弟之勞葢其才足以發名譽而韜於藏力能致富饒而樂於約善可表正鄉俗而泥於窮今而已矣君子曰有道之士傲焉若張遺焉若忘潜名而實昌晦迹而徳光斯可以誦吾弟矣吾弟配李氏邑巨族李思瞻之女有子而殤養闕子為子曰休弟未卒前二年側室錢氏生子一曰梗幼而有父風予夙夜望其成也女二長曰智李出既嫁而寡子死歸在室次曰雲側室蔡氏出尚幼予既為志哀不能句讀諸弟固欲為銘爰系諸末使翑書之銘曰弟永逝乎兄孔哀乎胡畀之厚乎而奪之速乎信天之不可質乎叔父故飛熊衛指揮公墓誌銘今年冬十一月丙申將葬我叔父指揮公于北山之陽從弟欽偕其季錦詣羽謀曰父葬宜有銘將託諸他聞人則懼畧於疏委諸先友則懼疑于近凡畧與疑皆非所以圖不朽也兄周旋諸父間得父之行實為悉而平生不以言語狥人夫人知之疏若近舉不足以嫌而又父意所屬也兄請無辭銘焉羽意難之㑹八弟前武選郎中􅙆自潮歸將之淛來言曰是有故事可從也昔昌黎公屢銘其族氏大人栁栁州自為先人墓表不以親避也兄非能䛕墓者適為先太守兄銘今銘不作謂如叔父何羽猶固謝而弟輩辭益義以恭因敘曰吾先世受姓命氏出黄帝後歴世邈綿統系支流莫可悉考家乗所載泰興有張氏始吾本真公由本真公三傳至仲纓公仲纓公之子為工部尚書虞衡員外郎佑之公佑之公生子四長諱某字某次諱某字某皆逸民三諱某字某家饒于財正統間邑中饑入千石於官詔旌其門鄉人稱為尚義張公四諱某字某仕至饒州府知府屬派實自四世祖以分叔父指揮公則尚義公之孫父樸菴公諱某字某母周孺人生公命之諱曰毓寧賔字之為廷謐弟二人仲諱毓明字廷昭季諱毓英字廷彦仕為仁和簿皆先公卒公少善治生然恥罔利既長盡讓二弟以屋廬父母悦其養天順迄成化間吾族以貲補散官者先後四人公與焉正徳中詔民得入貲授三品武銜公遂偕欽受告身注為南京飛熊衛指揮使借服金緋並復其身鄉人榮之今上嘉靖改元之三年邑中復大饑視正統年加甚公時寢疾召謂欽曰吾先公捐千石為子孫地至於今賴之聞鄉之人饑且死吾寧忍獨有餘必周之而行吾志欽既入義倉粟千石間為糜粥食餓人又數代有司輸輓為費復數百金遂被旌命如先公可謂世有其美者矣自吾先公員外公世戍靖州嵗合金繒若干為餉值歉輙不易供公曰此吾責也揮百金購善田收其入給戍者不以煩族人人益稱其為義公賦性簡重與人無畛域凡周恤人不以疏戚惟視賢而貧者先焉卒有横戾不逞或侮之亦置不較故人不得為間言加公奮其世業家累萬金欽繼承克肖益裨其規畫經紀家以益大初年有屋數其楹田僅千畝季年屋以楹計者幾及千計田之為畝萬數然公所遺於後人匪獨恃此也聞之先饒州公多尚義公所為語人曰吾兄其有後哉施及塗殍神聴之矣先中書公亦曰吾家諸少並雋茂可人若夫擅美箕裘襲芳堂構固自有其人耳時公葢在許可中今其言悉驗云公寢疾踰兩朞竟至不起卒之日逺邇聞之老者往哭少者趨弔道路咨嘆彌月不已時嘉靖丙戌九月十有七日也距其生正統十四年二月廿三日春秋七十有八矣嗚呼公年足以配徳名足以酬義哀榮始終於公足矣而人猶謂奪之速也然則食未既之報其在公之子若孫也嬸母朱孺人秦府紀善明通公之孫處士某公之女少歸公為伉儷公起家行義實多内助焉孺人生子一即欽勤生篤義稱為公子次蔣孺人生錦授經為太學生長益務學行底于成女一朱出適舉人何桐孫男五人棟梓椷樞臬棟早卒梓得與錦同升太學生孫女二皆嫁為士人妻公未病時嘗即近地從堪輿家相度之簣墳為山鑿窪為池樹以松檜崇以祠宇中作生丘謂曰信樂矣哉逝將休於斯於是日攜羣從故舊燕遊其間生死盛衰之説不能為欣戚於公公其達命矣夫地居邑之隂因名北山兹是之葬欽錦以先君之所營為増脩葺之可謂克盡飾終之禮者矣宜有述也今年為嘉靖己丑云銘曰吾宗之興粤惟四祖崇義積仁時莫與伍繄飛熊公克䋲前武擬食素封韜迹阡畝比屬㐫年人饑以阻廪有千石揮之如土爰被金緋焜燿門户施于後昆駢冠聮組八袠以終允受多祜北山之陽惟公之所從子作銘永質千古祭弟文舉嗚呼吾弟何為而遽有此禍也客中聞之哀慟垂死呼天叩地質之無從與其喪吾弟無寧喪予也念昔先父母生予兄弟七人妹二人不幸五弟翊及二妹相繼蚤世吾兄弟六人者五十年來友愛篤至父母安之族黨稱之家庭之間怡怡如也惟吾先人以及吾曹世稱清白先君在時嘗苦貧乏吾弟夙知幹蠱方僕僕為左右飱粥之謀憂虞苦樂偹嘗之矣先君官定興予及二弟四弟八弟咸有仕進之業不克以從季弟翑尚在孩提往送歸迎實仗吾弟予出為縣令弟為予而南予入為臺郎弟為予而北舟車川陸之險葢不避也若予與二弟之舉進士千里移家則又皆吾弟任其勞而父母弟妹之喪㷀㷀哀戚之中助予以襄事行禮者吾弟之力為多是吾弟事父母能服其勞處兄弟能敦其義貧賤憂患無適而不相須也今予叨副汴臺二弟出守信州四弟近領三衢學事八弟乆為禮曹郎七弟行且報捷南省兄弟駸駸向融計吾弟雖家居食貧身無冠紱之縈門無公府之擾庶幾優㳺徜徉於百年之間以與吾兄若弟白首叙天倫之樂於無窮以少酬疇昔勤苦之節不謂吾弟竟舍予而歿也嗚呼痛哉嗚呼痛哉予何能為生哉當予歸自圻輔貧不能以自贍弟待予益加厚予時在田舍間弟匹馬遙遙為予而來至則坐語終日無少厭怠及予復之武陽弟以家累不得如往昔之相從然千里尺書宛如面語在原之意實契予衷予意猶有百年之期不謂吾弟竟舍予而先殂也嗚呼痛哉予今而後其即歸去來耶弟無復從予以笑語其或乆於役耶盼望弟之音書亦永絶矣思弟而弟不來哭弟而弟不知予之為慟其有既耶抑予為官三十年家益以貧弟固未嘗得少依藉以長尺寸今而已矣將他日豐厚優裕固不可期思欲與弟共守貧苦如往時不可復得矣予之念弟其能已乎且予今年五十有六長弟三嵗而生平不肖於先人有子三人亦皆長立吾弟識慮過恒人讀書曉大義視予未老子孤而幼門户之事望弟以有興是予可以死而弟未可死之時也天乎天乎何奪吾弟之速也去冬十一月二月兒采來省于官云弟秋九月因食蟹誤吞其螯遂鯁而為疾今且就愈予固私以為憂後二日季弟輩令家人以訃音至葢病鯁之後為諸醫所誤以為痰火視之遂致不諱聞之驚慟若隕自天旋復圖歸彌留周月謂有君命未敢輙行且勢不得以亟去也因遺書戒弟子輩令卜塟期候得報音遂當就道襄弟大事以終予懷嗚呼昔五弟二妹之亡及諸幼姪之殤予皆在焉湯藥棺殮實親視之迄今二十年間時一興思不覺飲泣獨弟之疾予乃不得一視其狀一分其疼遐思易簀之時其諄諄夢寤之言戀戀懷兄之態當必有家人婦子所不能知不忍言者予固已知之矣痛哉痛哉天禍予兄弟何至此極也嗚呼已矣吾弟平生孝友能承順父母之懽心今未老而終又獲從先父母以遊於地下脩短之限人所不能逃獨且奈何弟葢將瞑目九泉而予之悲恫思望尚何所終窮也若百年之事義在于予一息尚存當不使弟有後憂也弟其有知庶諒予心兹遣采歸祭告弟靈瞻望天南涕血交迸嗚呼痛哉嗚呼痛哉尚享祭二伯父文羽小子不敢稱先徳惟吾伯父内剛厲而能柔克外疎濶而有亷隅交不擇利而親義不見難而隳非意干之不能一毫之挫赤心投之罔吝千金之揮睦族不有其仁恤隣恒先其施凡斯數端皆他人之所無伯父有之而亦衆所共知繄惟伯父雖以畎畝耕耘之姿而實為鄉里衣冠之懿厚業足以裕後令子足以承家及物者衆垂世者長殆所謂死而不亡者姪等及趨諸父之庭宿蒙猶子之愛謦欬雖逺典刑尚存永訣一觴哀慕罔既尚享祭弟鵬舉曰家門何為有此凶禍吾弟奄逝弟婦繼亡嗚呼痛哉吾弟才器夙成蚤登科甲花封栢府綽有賢聲爰及領郡益𢎞厥施憸人構釁毅然來歸吾時解官亦歸東田兄弟既翕朋舊交懽念吾先人率皆蚤世惟吾與弟垂至六袠白頭相期謂可百年不幸至此哀痛何言去年與弟燕客于堂今乃與客為弟發喪豈我骨肉則為永傷嗚呼痛哉弟婦孺人寔能内助一疾告終嗟天之數哀哉哀哉弟今何在生耶死耶抑豈夢耶胡不在公胡不在家嗚呼痛哉垂絶之容不逺吾目永訣之言不忘吾心視弟二子悲喜交集幸述已娶季亦岐嶷卜以今月廿有四日奉遷雙柩往營兆域率我妻子及我婦孫哭弟于堂弟能有聞吾老多病豈任哀苦百年有懷弟其知我祭二伯母文代振卿弟作痛惟二母繼歸先君猗彼堂萱附兹庭椿吾宗盛蕃諸妣淑均肆予母氏允嗣徽音先君棄背遭家不辰賴母尚在寔宜我人百年為期僅八逾旬皇天不弔母倐沉淪嗚呼痛哉撫我之徳生我之恩如彼昊天罔極疇倫雙靈在殯奄忽三春終身之慕何夕與晨嗚呼痛哉謹卜是月廿有二日奉遷靈車高嚴之原往從先君是依是親嗚呼痛哉篤親以仁執喪以心胡易之富胡戚之貧髙天厚地吾情無垠慈靈不昧鑒兹哀忱痛哉痛哉遺楷采楨分單父東田翁語汝楷采楨諸兒吾家世承宦業清白相傳較之宗人初無善田利産先君侍御公歿世之日止遺敝廬一區薄田二處今汝叔二人所業即是已吾歴仕三十餘年中間出處相半雖叨厚禄為貧為養自給未周畧無贏餘為汝曹地此在族黨鄉郡皆能知之然吾亦不以此自少顧汝兄弟三人同胞一氣不承尺寸之資幸而皆能自食差有田宅亦又何求但數百年詩禮家聲謂宜世守况吾與汝母皆年七旬老態日甚身後之念未能忘情且向遭非意之撓汝曹皆親嘗之足為殷鑒爰凂汝叔暨汝諸弟同至蒞盟吾手書將汝曹各有成業及先後積負明載其上粗注䂓條與為永質汝曹其體吾意自今益自飭勵恒相習為義毋相習為非義則吾生可以怡顔歿得以瞑目汝曹圖之計開𢎞治十五年吾因塟汝祖贈御史定興府君作書遣桂男至仁和借汝三叔祖銀四十兩後寄汝三叔還之前書未得徐質之宣卿正徳十年因楷援例入監憑黄潤夫等借汝五叔祖銀二百兩又憑表兄蔡誠表弟蔡濟借外祖明七公銀六十兩楷自還之正徳十五年我托汝十叔祖仁和叔祖親書一紙於汝五叔祖處認還未了借銀三百六十兩勿分祖債吾借昔汝祖歿時吾諸弟未仕而貧吾為兄蚤仕諸凡勉為不較弟輩皆知豈今數十年已成之約可復諉之誰哉我又自托黄潤夫輩借用銀八十兩與前共銀四百四十兩吾老矣前紙在汝叔堯卿宜卿處汝兄弟三人可分與一紙各承認銀一百四十七兩待後奉還汝二叔初未言及相周之義不可忘也知之楷正徳九等年買張家莊後趙政等陸地與續買地相參今歸之楷嘉靖等年買張宣卿蕭灣莊地一處嘉靖七年買楊景蕃等房地一所並是楷貲聴為世業采楨無與采於嘉靖二等年買三房東門房地一所吾賴以棲息及買封謐葉概二家房地蔣家堡頓車陸地二處東門曹均張模草塲並是采貲聴為世業楷楨無與楨嘉靖十年買張振卿東門基地一所又轉買楷灌漬港水田一處並是楨貲聴為世業楷采無與正徳十等年續買張家莊後蔡祥等陸地數百畝地瘠價亷銀不及二百兩正徳嘉靖間吾歸避居於彼廿年來游歌食息戀戀于兹吾即老去汝曹猶宜世守使後人知為東田舊業汝曹亦繫遐思然此亦在汝曹不聞平泉草樹文饒徒亦諄諄乎今計此地及家人數輩别為處分具載外紙原有東門草塲六十畝汝曹後來各得二十畝汝曹兄弟幸皆成立父母在上下及妻孥當承顔順志無有異心諸凡吉凶之事須和同均一處之毋多較量毎嵗常祀必誠必信毋或遺忘汝曹交親必擇賢論世若失之凶人匪類或恐遺笑抑有後憂汝曹凡子若孫務令讀書毋令飲博凋敗身家楷爾長既仕務為孝義以先諸人采爾有兄弟務為醇誠益敦孝義楨爾圖仕進勉為孝義以慰父兄嘉靖十五年春三月十三日書東田遺稿巻下
